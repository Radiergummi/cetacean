version: "2"

linters:
  default: standard
  enable:
    - misspell
  settings:
    errcheck:
      exclude-functions:
        - io.Copy
        - fmt.Fprintf
        - fmt.Fprint
        - fmt.Fprintln
        - (io.Closer).Close
        - (*encoding/json.Encoder).Encode
        - (*encoding/json.Decoder).Decode
        - (*net/http.Server).Shutdown
        - os.Unsetenv
        - (net/http.ResponseWriter).Write

formatters:
  enable:
    - gofmt

issues:
  exclude-dirs:
    - frontend
