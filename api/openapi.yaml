  # ── Networks ─────────────────────────────────────────────────────────

  /networks:
    get:
      operationId: listNetworks
      tags: [Networks]
      summary: List networks
      parameters:
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - name: sort
          in: query
          description: Field to sort the result list by
          schema:
            type: string
            enum: [name, driver, scope]
          example: name
        - $ref: "#/components/parameters/dir"
      responses:
        "200":
          description: Paginated network list
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            Link:
              $ref: "#/components/headers/Link"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkCollection"
              example:
                "@context": /api/context.jsonld
                "@type": Collection
                items:
                  - Id: net_ghi789
                    Name: myapp_default
                    Driver: overlay
                    Scope: swarm
                    IPAM:
                      Config:
                        - Subnet: 10.0.1.0/24
                    Labels:
                      com.docker.stack.namespace: myapp
                total: 6
                limit: 50
                offset: 0
            application/atom+xml:
              schema:
                $ref: "#/components/schemas/AtomFeed"
        "304":
          $ref: "#/components/responses/NotModified"
        "400":
          $ref: "#/components/responses/BadRequest"

  /networks/{id}:
    get:
      operationId: getNetwork
      tags: [Networks]
      summary: Network detail
      description: Returns the network and a list of services attached to it.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Network detail with cross-referenced services
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      network:
                        type: object
                        description: Docker network.Summary object
                      services:
                        type: array
                        items:
                          $ref: "#/components/schemas/ServiceRef"
              example:
                "@context": /api/context.jsonld
                "@id": /networks/net_ghi789
                "@type": Network
                network:
                  Id: net_ghi789
                  Name: myapp_default
                  Driver: overlay
                  Scope: swarm
                  IPAM:
                    Config:
                      - Subnet: 10.0.1.0/24
                        Gateway: 10.0.1.1
                  Labels:
                    com.docker.stack.namespace: myapp
                services:
                  - "@id": /services/r8m2x5nk3p7q
                    id: r8m2x5nk3p7q
                    name: webapp
            application/atom+xml:
              schema:
                $ref: "#/components/schemas/AtomFeed"
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: removeNetwork
      tags: [Networks]
      summary: Remove a network
      description: Removes a network from the swarm. Fails if services are still attached. Requires operations level 3.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "204":
          description: Network removed
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Volumes ──────────────────────────────────────────────────────────

  /volumes:
    get:
      operationId: listVolumes
      tags: [Volumes]
      summary: List volumes
      parameters:
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - name: sort
          in: query
          description: Field to sort the result list by
          schema:
            type: string
            enum: [name, driver, scope]
          example: name
        - $ref: "#/components/parameters/dir"
      responses:
        "200":
          description: Paginated volume list
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            Link:
              $ref: "#/components/headers/Link"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolumeCollection"
              example:
                "@context": /api/context.jsonld
                "@type": Collection
                items:
                  - Name: myapp_data
                    Driver: local
                    Scope: local
                    Mountpoint: /var/lib/docker/volumes/myapp_data/_data
                    Labels:
                      com.docker.stack.namespace: myapp
                total: 2
                limit: 50
                offset: 0
            application/atom+xml:
              schema:
                $ref: "#/components/schemas/AtomFeed"
        "304":
          $ref: "#/components/responses/NotModified"
        "400":
          $ref: "#/components/responses/BadRequest"

  /volumes/{name}:
    get:
      operationId: getVolume
      tags: [Volumes]
      summary: Volume detail
      description: |
        Returns the volume and a list of services using it.
        Note: volumes are keyed by name, not ID.
      parameters:
        - name: name
          in: path
          required: true
          description: Volume name
          schema:
            type: string
          example: myapp_data
      responses:
        "200":
          description: Volume detail with cross-referenced services
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      volume:
                        type: object
                        description: Docker volume.Volume object
                      services:
                        type: array
                        items:
                          $ref: "#/components/schemas/ServiceRef"
              example:
                "@context": /api/context.jsonld
                "@id": /volumes/myapp_data
                "@type": Volume
                volume:
                  Name: myapp_data
                  Driver: local
                  Scope: local
                  Mountpoint: /var/lib/docker/volumes/myapp_data/_data
                  Labels:
                    com.docker.stack.namespace: myapp
                services:
                  - "@id": /services/r8m2x5nk3p7q
                    id: r8m2x5nk3p7q
                    name: webapp
            application/atom+xml:
              schema:
                $ref: "#/components/schemas/AtomFeed"
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: removeVolume
      tags: [Volumes]
      summary: Remove a volume
      description: Removes a volume. Fails if the volume is in use by a container. Requires operations level 3.
      parameters:
        - name: name
          in: path
          required: true
          description: Volume name
          schema:
            type: string
          example: myapp_data
      responses:
        "204":
          description: Volume removed
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Search ───────────────────────────────────────────────────────────

  /search:
    get:
      operationId: search
      tags: [Search]
      summary: Global cross-resource search
      description: |
        Searches names, images, and labels across all resource types.
        Results are grouped by type. The `limit` parameter controls max results
        per type (default 3; 0 means up to 1000 per type).
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (case-insensitive substring match, max 200 chars)
          schema:
            type: string
            maxLength: 200
          example: web
        - name: limit
          in: query
          description: Max results per resource type (0 = up to 1000)
          schema:
            type: integer
            default: 3
            minimum: 0
          example: 5
      responses:
        "200":
          description: Grouped search results
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
              example:
                "@context": /api/context.jsonld
                "@id": /search?q=web
                "@type": SearchResult
                query: web
                results:
                  services:
                    - id: r8m2x5nk3p7q
                      name: webapp
                      detail: "nginx:1.27"
                      state: running
                  stacks:
                    - id: myapp
                      name: myapp
                counts:
                  services: 1
                  stacks: 1
                total: 2
            application/atom+xml:
              schema:
                $ref: "#/components/schemas/AtomFeed"
        "304":
          $ref: "#/components/responses/NotModified"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Topology ─────────────────────────────────────────────────────────

  /topology/networks:
    get:
      operationId: getNetworkTopology
      tags: [Topology]
      summary: Network topology graph
      description: |
        Returns a graph of services connected by shared overlay networks.
        Nodes are services, edges represent shared network membership.
      responses:
        "200":
          description: Network topology
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - $ref: "#/components/schemas/NetworkTopology"
              example:
                "@context": /api/context.jsonld
                "@id": /topology/networks
                "@type": NetworkTopology
                nodes:
                  - id: r8m2x5nk3p7q
                    name: webapp
                    stack: myapp
                  - id: t9n3y6ol4q8r
                    name: api
                    stack: myapp
                  - id: u0o4z7pm5r9s
                    name: postgres
                    stack: myapp
                edges:
                  - source: r8m2x5nk3p7q
                    target: t9n3y6ol4q8r
                    networks: [myapp_default]
                  - source: t9n3y6ol4q8r
                    target: u0o4z7pm5r9s
                    networks: [myapp_default]
        "304":
          $ref: "#/components/responses/NotModified"

  /topology/placement:
    get:
      operationId: getPlacementTopology
      tags: [Topology]
      summary: Task placement topology
      description: |
        Returns cluster nodes with their assigned tasks,
        for visualizing task placement across the swarm.
      responses:
        "200":
          description: Placement topology
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - $ref: "#/components/schemas/PlacementTopology"
              example:
                "@context": /api/context.jsonld
                "@id": /topology/placement
                "@type": PlacementTopology
                nodes:
                  - id: y3z4a5b6c7d8
                    hostname: swarm-mgr-01
                    role: manager
                    tasks:
                      - id: tsk_abc123
                        serviceName: webapp
                        state: running
                      - id: tsk_def456
                        serviceName: api
                        state: running
                  - id: e9f0g1h2i3j4
                    hostname: swarm-worker-01
                    role: worker
                    tasks:
                      - id: tsk_ghi789
                        serviceName: webapp
                        state: running
                      - id: tsk_jkl012
                        serviceName: postgres
                        state: running
        "304":
          $ref: "#/components/responses/NotModified"

  /recommendations:
    get:
      operationId: getRecommendations
      tags: [Recommendations]
      summary: Cluster health recommendations
      description: |
        Returns all active recommendations across four domains: resource sizing,
        config hygiene, operational health, and cluster topology. Items are sorted
        by severity (critical first). Includes a summary with severity counts.
      responses:
        "200":
          description: Recommendation collection
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Recommendation"
                      total:
                        type: integer
                      summary:
                        $ref: "#/components/schemas/RecommendationSummary"
                      computedAt:
                        type: string
                        format: date-time
              example:
                "@context": /api/context.jsonld
                "@id": /recommendations
                "@type": Recommendations
                items:
                  - category: no-healthcheck
                    severity: warning
                    scope: service
                    targetId: r8m2x5nk3p7q
                    targetName: webapp
                    message: Service has no health check configured
                  - category: single-replica
                    severity: info
                    scope: service
                    targetId: j4n6w8t2k9m1
                    targetName: api
                    message: Service runs a single replica with no redundancy
                total: 2
                limit: 2
                offset: 0
                summary:
                  critical: 0
                  warning: 1
                  info: 1
                computedAt: "2025-03-20T14:35:00Z"
            application/atom+xml:
              schema:
                $ref: "#/components/schemas/AtomFeed"
        "304":
          $ref: "#/components/responses/NotModified"

# ════════════════════════════════════════════════════════════════════════
# Components
# ════════════════════════════════════════════════════════════════════════

components:

  # ── Security Schemes ────────────────────────────────────────────────

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-cetacean_session
      description: Session cookie set after OIDC authentication
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token for machine-to-machine OIDC authentication

  # ── Parameters ───────────────────────────────────────────────────────

  parameters:
    resourceId:
      name: id
      in: path
      required: true
      description: Resource ID
      schema:
        type: string
      example: qz7k3v9xm2p4

    search:
      name: search
      in: query
      description: Case-insensitive substring search on resource names
      schema:
        type: string
      example: web

    filter:
      name: filter
      in: query
      description: |
        expr-lang filter expression (max 512 characters).
        Available fields depend on the resource type.
      schema:
        type: string
        maxLength: 512
      example: role == "manager" && state == "ready"

    limit:
      name: limit
      in: query
      description: Page size
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

    offset:
      name: offset
      in: query
      description: Starting offset for pagination
      schema:
        type: integer
        minimum: 0
        default: 0

    dir:
      name: dir
      in: query
      description: Sort direction
      schema:
        type: string
        enum: [asc, desc]
        default: asc

    logLimit:
      name: limit
      in: query
      description: Max log lines to return (JSON mode only)
      schema:
        type: integer
        minimum: 1
        maximum: 10000
        default: 500

    logAfter:
      name: after
      in: query
      description: |
        Return lines after this timestamp (RFC 3339 or Go duration).
        For SSE, Last-Event-ID header is used as fallback.
      schema:
        type: string

    logBefore:
      name: before
      in: query
      description: |
        Return lines before this timestamp (RFC 3339 or Go duration).
        Not supported for SSE streams (returns 400).
      schema:
        type: string

    logStream:
      name: stream
      in: query
      description: Filter by output stream
      schema:
        type: string
        enum: [stdout, stderr]

  # ── Headers ──────────────────────────────────────────────────────────

  headers:
    ETag:
      description: Weak ETag for conditional requests (use with If-None-Match)
      schema:
        type: string
        example: '"w/abc123"'

    Link:
      description: RFC 8288 pagination links (rel="next", rel="prev")
      schema:
        type: string
        example: '</nodes?limit=50&offset=50>; rel="next"'

    Retry-After:
      description: Seconds to wait before retrying
      schema:
        type: integer
        example: 5

  # ── Responses ────────────────────────────────────────────────────────

  responses:
    NotModified:
      description: Not modified (ETag matched If-None-Match)

    BadRequest:
      description: Bad request (invalid filter, missing parameter, etc.)
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    NotAcceptable:
      description: Requested content type not supported for this endpoint
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    Conflict:
      description: Version conflict — the resource was modified concurrently; retry the operation
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    UnsupportedMediaType:
      description: Unsupported Content-Type for this endpoint
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    TooManyRequests:
      description: Too many concurrent connections
      headers:
        Retry-After:
          $ref: "#/components/headers/Retry-After"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

  # ── Schemas ──────────────────────────────────────────────────────────

  schemas:

    # ── Atom Feed ──────────────────────────────────────────────────

    AtomFeed:
      type: string
      description: |
        Atom 1.0 feed document (RFC 4287). Contains resource change history
        entries with cursor-based pagination links (RFC 5005). Request via
        `Accept: application/atom+xml` header or `.atom` URL suffix.

        Pagination parameters: `?before=<cursor>&limit=<n>` (default 50, max 200).

    # ── Error ────────────────────────────────────────────────────────

    ProblemDetail:
      type: object
      description: |
        RFC 9457 Problem Details with JSON-LD @context.
        Domain-specific errors use `/api/errors/{code}` as the type URI
        (e.g. `/api/errors/SVC001`). Generic errors use `about:blank`.
      required: [type, title, status]
      properties:
        "@context":
          type: string
          example: /api/context.jsonld
        type:
          type: string
          description: "Problem type URI — `/api/errors/{code}` for domain errors, `about:blank` for generic"
          example: /api/errors/SVC001
        title:
          type: string
          description: Short human-readable summary
          example: Service Version Conflict
        status:
          type: integer
          description: HTTP status code
          example: 409
        detail:
          type: string
          description: Human-readable explanation
        instance:
          type: string
          description: Request path that generated the error
        requestId:
          type: string
          description: Correlation ID for this request

    ErrorDef:
      type: object
      description: Documentation for a well-known error code
      required: [code, title, status, description, suggestion]
      properties:
        code:
          type: string
          description: "Stable error code (three-letter prefix + three-digit number)"
          example: SVC001
        title:
          type: string
          description: Short human-readable title
          example: Service Version Conflict
        status:
          type: integer
          description: HTTP status code this error produces
          example: 409
        description:
          type: string
          description: Detailed explanation of the error
        suggestion:
          type: string
          description: Recommended action to resolve the error

    # ── JSON-LD Envelopes ────────────────────────────────────────────

    DetailEnvelope:
      type: object
      description: JSON-LD wrapper for detail endpoints
      properties:
        "@context":
          type: string
          example: /api/context.jsonld
        "@id":
          type: string
          description: Canonical path of this resource
          example: /nodes/abc123
        "@type":
          type: string
          description: Resource type name
          example: Node

    CollectionEnvelope:
      type: object
      description: JSON-LD wrapper for list endpoints
      required: [items, total, limit, offset]
      properties:
        "@context":
          type: string
          example: /api/context.jsonld
        "@type":
          type: string
          example: Collection
        items:
          type: array
          items: {}
        total:
          type: integer
          description: Total number of items matching the query
        limit:
          type: integer
          description: Page size used
        offset:
          type: integer
          description: Starting offset used

    # ── Collections ──────────────────────────────────────────────────

    NodeCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
                description: Docker swarm.Node object

    ServiceCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ServiceListItem"

    TaskCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/EnrichedTask"

    StackCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Stack"

    ConfigCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
                description: Docker swarm.Config object

    SecretCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
                description: Docker swarm.Secret object (data always nil)

    NetworkCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
                description: Docker network.Summary object

    VolumeCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
                description: Docker volume.Volume object

    HistoryCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/HistoryEntry"

    DiskUsageCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/DiskUsageSummary"

    PluginCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
                description: Docker Plugin object

    StackSummaryCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/StackSummary"

    # ── Resource Types ───────────────────────────────────────────────

    ServiceRef:
      type: object
      description: Lightweight service cross-reference
      properties:
        "@id":
          type: string
          description: Canonical path
          example: /services/abc123
        id:
          type: string
        name:
          type: string

    ServiceListItem:
      type: object
      description: Service with running task count (extends Docker swarm.Service)
      properties:
        ID:
          type: string
        Spec:
          type: object
          description: Docker ServiceSpec
        RunningTasks:
          type: integer
          description: Number of currently running tasks

    EnrichedTask:
      type: object
      description: Docker swarm.Task with added ServiceName and NodeHostname
      properties:
        ID:
          type: string
        ServiceID:
          type: string
        NodeID:
          type: string
        Status:
          type: object
          description: Docker TaskStatus
        ServiceName:
          type: string
          description: Resolved from cache
        NodeHostname:
          type: string
          description: Resolved from cache

    Stack:
      type: object
      properties:
        name:
          type: string
        services:
          type: array
          items:
            type: string
          description: Service IDs
        configs:
          type: array
          items:
            type: string
          description: Config IDs
        secrets:
          type: array
          items:
            type: string
          description: Secret IDs
        networks:
          type: array
          items:
            type: string
          description: Network IDs
        volumes:
          type: array
          items:
            type: string
          description: Volume names

    StackDetail:
      type: object
      description: Full stack with resolved resources
      properties:
        name:
          type: string
        services:
          type: array
          items:
            type: object
            description: Docker swarm.Service objects
        configs:
          type: array
          items:
            type: object
            description: Docker swarm.Config objects
        secrets:
          type: array
          items:
            type: object
            description: Docker swarm.Secret objects (data redacted)
        networks:
          type: array
          items:
            type: object
            description: Docker network.Summary objects
        volumes:
          type: array
          items:
            type: object
            description: Docker volume.Volume objects

    StackSummary:
      type: object
      properties:
        name:
          type: string
        serviceCount:
          type: integer
        configCount:
          type: integer
        secretCount:
          type: integer
        networkCount:
          type: integer
        volumeCount:
          type: integer
        desiredTasks:
          type: integer
        tasksByState:
          type: object
          additionalProperties:
            type: integer
        updatingServices:
          type: integer
        memoryLimitBytes:
          type: integer
          format: int64
        cpuLimitCores:
          type: number
          format: double
        memoryUsageBytes:
          type: integer
          format: int64
          description: Populated from Prometheus (0 if unavailable)
        cpuUsagePercent:
          type: number
          format: double
          description: Populated from Prometheus (0 if unavailable)

    # ── Recommendations ─────────────────────────────────────────────

    Recommendation:
      type: object
      properties:
        category:
          type: string
          enum:
            - over-provisioned
            - approaching-limit
            - at-limit
            - no-limits
            - no-reservations
            - no-healthcheck
            - no-restart-policy
            - flaky-service
            - node-disk-full
            - node-memory-pressure
            - single-replica
            - manager-has-workloads
            - uneven-distribution
        severity:
          type: string
          enum: [info, warning, critical]
        scope:
          type: string
          enum: [service, node, cluster]
        targetId:
          type: string
        targetName:
          type: string
        resource:
          type: string
        message:
          type: string
        current:
          type: number
        configured:
          type: number
        suggested:
          type: number
        fixAction:
          type: string

    RecommendationSummary:
      type: object
      properties:
        critical:
          type: integer
        warning:
          type: integer
        info:
          type: integer

    # ── Cluster ──────────────────────────────────────────────────────

    ClusterSnapshot:
      type: object
      properties:
        nodeCount:
          type: integer
        serviceCount:
          type: integer
        taskCount:
          type: integer
        stackCount:
          type: integer
        tasksByState:
          type: object
          additionalProperties:
            type: integer
        nodesReady:
          type: integer
        nodesDown:
          type: integer
        nodesDraining:
          type: integer
        totalCPU:
          type: integer
        totalMemory:
          type: integer
          format: int64
        servicesConverged:
          type: integer
        servicesDegraded:
          type: integer
        reservedCPU:
          type: integer
          format: int64
        reservedMemory:
          type: integer
          format: int64
        maxNodeCPU:
          type: integer
          description: CPU cores of the largest single node
        maxNodeMemory:
          type: integer
          format: int64
          description: Memory bytes of the largest single node
        lastSync:
          type: string
          format: date-time
        prometheusConfigured:
          type: boolean
        localNodeID:
          type: string

    ClusterCapacity:
      type: object
      properties:
        maxNodeCPU:
          type: integer
          description: CPU cores of the largest single node
        maxNodeMemory:
          type: integer
          format: int64
          description: Memory bytes of the largest single node
        totalCPU:
          type: integer
          description: Total CPU cores across all nodes
        totalMemory:
          type: integer
          format: int64
          description: Total memory bytes across all nodes
        nodeCount:
          type: integer
          description: Number of nodes in the cluster

    ClusterMetrics:
      type: object
      properties:
        cpu:
          $ref: "#/components/schemas/ResourceMetric"
        memory:
          $ref: "#/components/schemas/ResourceMetric"
        disk:
          $ref: "#/components/schemas/ResourceMetric"

    ResourceMetric:
      type: object
      properties:
        used:
          type: number
          format: double
        total:
          type: number
          format: double
        percent:
          type: number
          format: double

    DiskUsageSummary:
      type: object
      properties:
        type:
          type: string
          enum: [images, containers, volumes, buildCache]
        count:
          type: integer
        active:
          type: integer
        totalSize:
          type: integer
          format: int64
        reclaimable:
          type: integer
          format: int64

    MonitoringStatus:
      type: object
      properties:
        prometheusConfigured:
          type: boolean
        prometheusReachable:
          type: boolean
        error:
          type: string
          description: Diagnostic message when Prometheus is configured but unreachable.
        nodeExporter:
          $ref: "#/components/schemas/TargetStatus"
        cadvisor:
          $ref: "#/components/schemas/TargetStatus"

    TargetStatus:
      type: object
      properties:
        targets:
          type: integer
          description: Number of active targets detected
        nodes:
          type: integer
          description: Total nodes in the cluster (for comparison)

    # ── History ──────────────────────────────────────────────────────

    HistoryEntry:
      type: object
      properties:
        id:
          type: integer
          format: uint64
        timestamp:
          type: string
          format: date-time
        type:
          type: string
          description: Resource type (node, service, task, etc.)
        action:
          type: string
          description: Change action (set, delete)
        resourceId:
          type: string
        name:
          type: string
        summary:
          type: string

    # ── Logs ─────────────────────────────────────────────────────────

    LogResponse:
      type: object
      properties:
        lines:
          type: array
          items:
            $ref: "#/components/schemas/LogLine"
        oldest:
          type: string
          description: Timestamp of the oldest line returned
        newest:
          type: string
          description: Timestamp of the newest line returned
        hasMore:
          type: boolean
          description: Whether more lines exist beyond the limit

    LogLine:
      type: object
      properties:
        timestamp:
          type: string
          description: RFC 3339 Nano timestamp
        message:
          type: string
        stream:
          type: string
          enum: [stdout, stderr]
        attrs:
          type: object
          additionalProperties:
            type: string
          description: Docker log attributes (e.g. task ID)

    # ── SSE ──────────────────────────────────────────────────────────

    SSEEvent:
      type: object
      description: |
        JSON payload of an SSE event. Single events have `event: <type>`,
        batched events have `event: batch` with an array of these objects.
      properties:
        "@id":
          type: string
          description: Canonical resource path
        "@type":
          type: string
          description: Resource type (Node, Service, Task, etc.)
        type:
          type: string
          description: Event type string (node, service, task, etc.)
        action:
          type: string
          description: Event action (set, delete)
        id:
          type: string
          description: Resource ID
        resource:
          type: object
          description: The full resource object (type varies by event type)

    # ── Search ───────────────────────────────────────────────────────

    SearchResponse:
      type: object
      properties:
        "@context":
          type: string
          example: /api/context.jsonld
        "@id":
          type: string
          example: /search
        "@type":
          type: string
          example: SearchResult
        query:
          type: string
        results:
          type: object
          description: Grouped results keyed by resource type
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/SearchResult"
        counts:
          type: object
          description: Total match count per type (may exceed returned results)
          additionalProperties:
            type: integer
        total:
          type: integer
          description: Total matches across all types

    SearchResult:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        detail:
          type: string
          description: Context-dependent detail (image, driver, date, etc.)
        state:
          type: string
          description: Present for services and tasks

    # ── Topology ─────────────────────────────────────────────────────

    NetworkTopology:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/TopoServiceNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/TopoEdge"
        networks:
          type: array
          items:
            $ref: "#/components/schemas/TopoNetwork"

    TopoServiceNode:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        stack:
          type: string
        replicas:
          type: integer
        image:
          type: string
        ports:
          type: array
          items:
            type: string
        mode:
          type: string
          enum: [replicated, global]
        updateStatus:
          type: string
        networkAliases:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    TopoEdge:
      type: object
      properties:
        source:
          type: string
          description: Service ID
        target:
          type: string
          description: Service ID
        networks:
          type: array
          items:
            type: string
          description: Shared network IDs

    TopoNetwork:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        driver:
          type: string
        scope:
          type: string
        stack:
          type: string

    PlacementTopology:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/TopoClusterNode"

    TopoClusterNode:
      type: object
      properties:
        id:
          type: string
        hostname:
          type: string
        role:
          type: string
        state:
          type: string
        availability:
          type: string
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/TopoTask"

    TopoTask:
      type: object
      properties:
        id:
          type: string
        serviceId:
          type: string
        serviceName:
          type: string
        state:
          type: string
        slot:
          type: integer
        image:
          type: string

    Identity:
      type: object
      required:
        - subject
        - displayName
        - provider
      properties:
        subject:
          type: string
          description: Unique identifier for the user/machine
        displayName:
          type: string
          description: Human-friendly display name
        email:
          type: string
          description: Email address (if available)
        groups:
          type: array
          items:
            type: string
          description: Group memberships (if available)
        provider:
          type: string
          enum: [none, oidc, tailscale, cert, headers]
          description: Authentication provider that produced this identity
        raw:
          type: object
          additionalProperties: true
          description: All raw claims from the authentication provider

    # ── Write operation schemas ───────────────────────────────────────

    JSONPatch:
      type: array
      description: JSON Patch document (RFC 6902)
      items:
        type: object
        required: [op, path]
        properties:
          op:
            type: string
            enum: [add, remove, replace, test]
            description: Patch operation
          path:
            type: string
            description: Key name (with or without leading /)
          value:
            type: string
            description: New value (required for add/replace/test)

    ServiceResources:
      type: object
      description: CPU and memory resource requirements for a service
      properties:
        cpuLimit:
          type: integer
          format: int64
          description: CPU limit in nanoCPUs (null to unset)
          nullable: true
        cpuReservation:
          type: integer
          format: int64
          description: CPU reservation in nanoCPUs (null to unset)
          nullable: true
        memoryLimit:
          type: integer
          format: int64
          description: Memory limit in bytes (null to unset)
          nullable: true
        memoryReservation:
          type: integer
          format: int64
          description: Memory reservation in bytes (null to unset)
          nullable: true

    ServicePlacement:
      type: object
      description: Placement constraints and preferences for a service
      properties:
        placement:
          type: object
          description: Docker swarm placement configuration
          properties:
            Constraints:
              type: array
              items:
                type: string
              description: Placement constraint expressions (e.g. "node.role == manager")
            Preferences:
              type: array
              description: Placement preference strategies
              items:
                type: object
            MaxReplicas:
              type: integer
              format: int64
              description: Maximum replicas per node (0 = unlimited)
            Platforms:
              type: array
              description: Target platforms
              items:
                type: object

    ServicePorts:
      type: object
      description: Published port configurations for a service
      properties:
        ports:
          type: array
          items:
            type: object
            description: Docker swarm PortConfig
            properties:
              Protocol:
                type: string
                enum: [tcp, udp, sctp]
              TargetPort:
                type: integer
                format: int64
              PublishedPort:
                type: integer
                format: int64
              PublishMode:
                type: string
                enum: [ingress, host]

    ServiceUpdatePolicy:
      type: object
      description: Rolling update configuration for a service
      properties:
        parallelism:
          type: integer
          format: int64
          description: Number of tasks to update simultaneously
        delay:
          type: integer
          format: int64
          description: Delay between updates in nanoseconds
        failureAction:
          type: string
          enum: [continue, pause, rollback]
        monitor:
          type: integer
          format: int64
          description: Duration after each task update to monitor for failure (nanoseconds)
        maxFailureRatio:
          type: number
          format: float
          description: Fraction of tasks that may fail during an update
        order:
          type: string
          enum: [stop-first, start-first]

    ServiceRollbackPolicy:
      type: object
      description: Rollback configuration for a service
      properties:
        parallelism:
          type: integer
          format: int64
          description: Number of tasks to roll back simultaneously
        delay:
          type: integer
          format: int64
          description: Delay between rollback steps in nanoseconds
        failureAction:
          type: string
          enum: [continue, pause]
        monitor:
          type: integer
          format: int64
          description: Duration after each task rollback to monitor for failure (nanoseconds)
        maxFailureRatio:
          type: number
          format: float
          description: Fraction of tasks that may fail during a rollback
        order:
          type: string
          enum: [stop-first, start-first]

    ServiceLogDriver:
      type: object
      description: Log driver configuration for a service
      properties:
        logDriver:
          type: object
          description: Docker driver configuration
          nullable: true
          properties:
            Name:
              type: string
              description: Log driver name (e.g. "json-file", "syslog", "none")
            Options:
              type: object
              additionalProperties:
                type: string
              description: Log driver options

    # ── Integrations ──────────────────────────────────────────────────

    Integration:
      description: A detected third-party integration on a service
      discriminator:
        propertyName: name
        mapping:
          traefik: "#/components/schemas/TraefikIntegration"
          shepherd: "#/components/schemas/ShepherdIntegration"
          swarm-cronjob: "#/components/schemas/CronjobIntegration"
          diun: "#/components/schemas/DiunIntegration"
      oneOf:
        - $ref: "#/components/schemas/TraefikIntegration"
        - $ref: "#/components/schemas/ShepherdIntegration"
        - $ref: "#/components/schemas/CronjobIntegration"
        - $ref: "#/components/schemas/DiunIntegration"

    TraefikIntegration:
      type: object
      description: Traefik reverse proxy integration detected from service labels
      required: [name]
      properties:
        name:
          type: string
          enum: [traefik]
          description: Discriminator field identifying the integration type
        enabled:
          type: boolean
          description: Whether the Traefik integration is enabled
        routers:
          type: array
          items:
            $ref: "#/components/schemas/TraefikRouter"
        services:
          type: array
          items:
            $ref: "#/components/schemas/TraefikService"
        middlewares:
          type: array
          items:
            $ref: "#/components/schemas/TraefikMiddleware"

    TraefikRouter:
      type: object
      description: A Traefik router detected from service labels
      properties:
        name:
          type: string
          description: Router name
        rule:
          type: string
          description: Routing rule expression (e.g. "Host(`example.com`)")
        entrypoints:
          type: array
          items:
            type: string
          description: Entrypoint names this router listens on
        tls:
          $ref: "#/components/schemas/TraefikTLS"
        middlewares:
          type: array
          items:
            type: string
          description: Middleware names attached to this router
        service:
          type: string
          description: Backend service name this router forwards to
        priority:
          type: integer
          description: Router priority (higher wins on rule conflicts)

    TraefikTLS:
      type: object
      description: TLS configuration for a Traefik router
      properties:
        certResolver:
          type: string
          description: Certificate resolver name (e.g. "letsencrypt")
        domains:
          type: array
          items:
            $ref: "#/components/schemas/TraefikTLSDomain"
          description: Explicit domain entries for certificate generation
        options:
          type: string
          description: TLS options name

    TraefikTLSDomain:
      type: object
      description: A domain entry in Traefik TLS configuration
      properties:
        main:
          type: string
          description: Primary domain name
        sans:
          type: array
          items:
            type: string
          description: Subject alternative names

    TraefikService:
      type: object
      description: A Traefik service detected from service labels
      properties:
        name:
          type: string
          description: Service name
        port:
          type: integer
          description: Backend port number
        scheme:
          type: string
          description: Backend scheme (e.g. "http", "https", "h2c")

    TraefikMiddleware:
      type: object
      description: A Traefik middleware detected from service labels
      properties:
        name:
          type: string
          description: Middleware name
        type:
          type: string
          description: Middleware type (e.g. "redirectScheme", "basicAuth")
        config:
          type: object
          additionalProperties: true
          description: Middleware configuration key-value pairs

    ShepherdIntegration:
      type: object
      description: Shepherd auto-update integration detected from service labels
      required: [name]
      properties:
        name:
          type: string
          enum: [shepherd]
        enabled:
          type: boolean
        authConfig:
          type: string
          description: Registry auth configuration ID

    CronjobIntegration:
      type: object
      description: Swarm Cronjob integration detected from service labels
      required: [name]
      properties:
        name:
          type: string
          enum: [swarm-cronjob]
        enabled:
          type: boolean
        schedule:
          type: string
          description: Cron expression
        skipRunning:
          type: boolean
        replicas:
          type: integer
        registryAuth:
          type: boolean
        queryRegistry:
          type: boolean

    DiunIntegration:
      type: object
      description: Diun image update notifier integration detected from service labels
      required: [name]
      properties:
        name:
          type: string
          enum: [diun]
        enabled:
          type: boolean
        regopt:
          type: string
          description: Registry options name
        watchRepo:
          type: boolean
        notifyOn:
          type: string
          description: "Semicolon-separated triggers (new, update)"
        sortTags:
          type: string
          enum: [default, reverse, semver, lexicographical]
        maxTags:
          type: integer
        includeTags:
          type: string
          description: Regex for tag inclusion
        excludeTags:
          type: string
          description: Regex for tag exclusion
        hubLink:
          type: string
        platform:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
