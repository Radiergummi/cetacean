      tags: [Services]
      summary: Service logs
      description: |
        JSON (default): returns paginated log lines.
        SSE (`Accept: text/event-stream`): streams log lines in real time.

        SSE streams have a 128-connection limit (returns 429 when exceeded).
      parameters:
        - $ref: "#/components/parameters/resourceId"
