          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    target:
                      type: string
                    aliases:
                      type: array
                      items:
                        type: string
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchServiceNetworks
      tags: [Services]
      summary: Patch service network attachments
      description: Replaces the network attachments for the service. Requires operations level 2.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  target:
                    type: string
                  aliases:
                    type: array
                    items:
                      type: string
      responses:
        "200":
          description: Updated network attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /services/{id}/mounts:
    get:
      operationId: getServiceMounts
      tags: [Services]
      summary: Get service mount configuration
      description: Returns the mount configuration for the service.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Mount configuration
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  description: Docker mount.Mount object
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchServiceMounts
      tags: [Services]
      summary: Patch service mount configuration
      description: Replaces the mount configuration for the service. Requires operations level 2.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                description: Docker mount.Mount object
      responses:
        "200":
          description: Updated mount configuration
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /services/{id}/container-config:
    get:
      operationId: getServiceContainerConfig
      tags: [Services]
      summary: Get service container config
      description: Returns the container-level configuration (hostname, user, working dir, args, etc.).
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Container configuration
          content:
            application/json:
              schema:
                type: object
                description: Subset of Docker container spec fields
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchServiceContainerConfig
      tags: [Services]
      summary: Patch service container config
      description: |
        Applies a JSON Merge Patch (RFC 7396) to the service container configuration.
        Requires `Content-Type: application/merge-patch+json`. Requires operations level 2.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              type: object
              description: Container config fields to merge
      responses:
        "200":
          description: Updated container configuration
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"

  /services/{id}/mode:
    put:
      operationId: updateServiceMode
      tags: [Services]
      summary: Change service mode
      description: |
        Changes the service mode between replicated and global.
        For replicated mode, specify the initial replica count. Requires operations level 3.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [replicated, global]
                replicas:
                  type: integer
                  minimum: 0
                  description: Initial replica count (only for replicated mode)
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /services/{id}/endpoint-mode:
    put:
      operationId: updateServiceEndpointMode
      tags: [Services]
      summary: Change service endpoint mode
      description: |
        Changes the service endpoint mode between vip and dnsrr. Requires operations level 3.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpointMode]
              properties:
                endpointMode:
                  type: string
                  enum: [vip, dnsrr]
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Tasks ────────────────────────────────────────────────────────────

  /tasks:
    get:
      operationId: listTasks
      tags: [Tasks]
      summary: List tasks
      description: |
        Tasks are returned as EnrichedTask objects with ServiceName and
        NodeHostname populated from cache cross-references.
      parameters:
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - name: sort
          in: query
          schema:
            type: string
            enum: [state, service, node]
        - $ref: "#/components/parameters/dir"
      responses:
        "200":
          description: Paginated task list
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            Link:
              $ref: "#/components/headers/Link"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskCollection"
        "304":
          $ref: "#/components/responses/NotModified"
        "400":
          $ref: "#/components/responses/BadRequest"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [Tasks]
      summary: Task detail
      description: |
        Returns the enriched task with cross-references to its service and node.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Task detail with service and node refs
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      task:
                        $ref: "#/components/schemas/EnrichedTask"
                      service:
                        type: object
                        description: Cross-reference to the parent service
                        properties:
                          "@id":
                            type: string
                          name:
                            type: string
                      node:
                        type: object
                        description: Cross-reference to the assigned node
                        properties:
                          "@id":
                            type: string
                          hostname:
                            type: string
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: removeTask
      tags: [Tasks]
      summary: Force-remove a task
      description: |
        Forces removal of a task (equivalent to `docker rm -f` on the underlying container).
        Only works on tasks whose containers are still accessible on the node.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "204":
          description: Task removed
        "404":
          $ref: "#/components/responses/NotFound"

  /tasks/{id}/logs:
    get:
      operationId: getTaskLogs
      tags: [Tasks]
      summary: Task logs
      description: |
        JSON (default): returns paginated log lines.
        SSE (`Accept: text/event-stream`): streams log lines in real time.

        SSE streams have a 128-connection limit (returns 429 when exceeded).
      parameters:
        - $ref: "#/components/parameters/resourceId"
        - $ref: "#/components/parameters/logLimit"
        - $ref: "#/components/parameters/logAfter"
        - $ref: "#/components/parameters/logBefore"
        - $ref: "#/components/parameters/logStream"
      responses:
        "200":
          description: Log lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogResponse"
            text/event-stream:
              schema:
                $ref: "#/components/schemas/LogLine"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ── History ──────────────────────────────────────────────────────────

  /history:
    get:
      operationId: getHistory
      tags: [History]
      summary: Resource change history
      description: |
        Returns recent change events from the in-memory ring buffer (10,000 entries).
        Can be filtered by resource type and/or specific resource ID.
      parameters:
        - name: type
          in: query
          description: Filter by resource type (node, service, task, etc.)
          schema:
            type: string
        - name: resourceId
          in: query
          description: Filter by specific resource ID
          schema:
            type: string
        - name: limit
          in: query
          description: Max entries to return
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: History entries
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryCollection"
        "304":
          $ref: "#/components/responses/NotModified"

  # ── Stacks ───────────────────────────────────────────────────────────

  /stacks:
    get:
      operationId: listStacks
      tags: [Stacks]
      summary: List stacks
      description: Stacks derived from the com.docker.stack.namespace label.
      parameters:
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - name: sort
          in: query
          schema:
            type: string
            enum: [name]
        - $ref: "#/components/parameters/dir"
      responses:
        "200":
          description: Paginated stack list
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            Link:
              $ref: "#/components/headers/Link"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StackCollection"
        "304":
          $ref: "#/components/responses/NotModified"
        "400":
          $ref: "#/components/responses/BadRequest"

  /stacks/summary:
    get:
      operationId: getStackSummary
      tags: [Stacks]
      summary: Stack summaries with metrics
      description: |
        Returns all stacks with task counts and optional Prometheus metrics
        (memory usage, CPU usage per stack).
      responses:
        "200":
          description: Stack summaries
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StackSummaryCollection"
        "304":
          $ref: "#/components/responses/NotModified"

  /stacks/{name}:
    get:
      operationId: getStack
      tags: [Stacks]
      summary: Stack detail
      description: Full stack with all its services, configs, secrets, networks, and volumes.
      parameters:
        - name: name
          in: path
          required: true
          description: Stack name
          schema:
            type: string
      responses:
        "200":
          description: Stack detail
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      stack:
                        $ref: "#/components/schemas/StackDetail"
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: removeStack
      tags: [Stacks]
      summary: Remove a stack
      description: Removes all services in the stack. Requires operations level 3.
      parameters:
        - name: name
          in: path
          required: true
          description: Stack name
          schema:
            type: string
      responses:
        "200":
          description: Stack removal initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  removed:
                    type: array
                    items:
                      type: string
                    description: IDs of removed services
                  failed:
                    type: array
                    items:
                      type: string
                    description: IDs of services that failed to remove
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Configs ──────────────────────────────────────────────────────────

  /configs:
    get:
      operationId: listConfigs
      tags: [Configs]
      summary: List configs
      parameters:
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, created, updated]
        - $ref: "#/components/parameters/dir"
      responses:
        "200":
          description: Paginated config list
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            Link:
              $ref: "#/components/headers/Link"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigCollection"
        "304":
          $ref: "#/components/responses/NotModified"
        "400":
          $ref: "#/components/responses/BadRequest"

  /configs/{id}:
    get:
      operationId: getConfig
      tags: [Configs]
      summary: Config detail
      description: |
        Returns the config with its data (base64-encoded) and
        a list of services using this config.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Config detail with cross-referenced services
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      config:
                        type: object
                        description: Docker swarm.Config object (data is base64-encoded)
                      services:
                        type: array
                        items:
                          $ref: "#/components/schemas/ServiceRef"
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: removeConfig
      tags: [Configs]
      summary: Remove a config
      description: Removes a config from the swarm. Fails if the config is in use by a service. Requires operations level 3.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "204":
          description: Config removed
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Secrets ──────────────────────────────────────────────────────────

  /secrets:
    get:
      operationId: listSecrets
      tags: [Secrets]
      summary: List secrets
      description: Secret data is always redacted (cleared before response).
      parameters:
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, created, updated]
        - $ref: "#/components/parameters/dir"
      responses:
        "200":
          description: Paginated secret list
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            Link:
              $ref: "#/components/headers/Link"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretCollection"
        "304":
          $ref: "#/components/responses/NotModified"
        "400":
          $ref: "#/components/responses/BadRequest"

  /secrets/{id}:
    get:
      operationId: getSecret
      tags: [Secrets]
      summary: Secret detail
      description: |
        Returns the secret metadata (data always redacted) and
        a list of services using this secret.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Secret detail with cross-referenced services
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      secret:
                        type: object
                        description: Docker swarm.Secret object (data always nil)
                      services:
                        type: array
                        items:
                          $ref: "#/components/schemas/ServiceRef"
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: removeSecret
      tags: [Secrets]
      summary: Remove a secret
      description: Removes a secret from the swarm. Fails if the secret is in use by a service. Requires operations level 3.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "204":
          description: Secret removed
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Networks ─────────────────────────────────────────────────────────

  /networks:
    get:
      operationId: listNetworks
      tags: [Networks]
      summary: List networks
      parameters:
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, driver, scope]
        - $ref: "#/components/parameters/dir"
      responses:
        "200":
          description: Paginated network list
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            Link:
              $ref: "#/components/headers/Link"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkCollection"
        "304":
          $ref: "#/components/responses/NotModified"
        "400":
          $ref: "#/components/responses/BadRequest"

  /networks/{id}:
    get:
      operationId: getNetwork
      tags: [Networks]
      summary: Network detail
      description: Returns the network and a list of services attached to it.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Network detail with cross-referenced services
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      network:
                        type: object
                        description: Docker network.Summary object
                      services:
                        type: array
                        items:
                          $ref: "#/components/schemas/ServiceRef"
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: removeNetwork
      tags: [Networks]
      summary: Remove a network
      description: Removes a network from the swarm. Fails if services are still attached. Requires operations level 3.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "204":
          description: Network removed
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Volumes ──────────────────────────────────────────────────────────

  /volumes:
    get:
      operationId: listVolumes
      tags: [Volumes]
      summary: List volumes
      parameters:
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, driver, scope]
        - $ref: "#/components/parameters/dir"
      responses:
        "200":
          description: Paginated volume list
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            Link:
              $ref: "#/components/headers/Link"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolumeCollection"
        "304":
          $ref: "#/components/responses/NotModified"
        "400":
          $ref: "#/components/responses/BadRequest"

  /volumes/{name}:
    get:
      operationId: getVolume
      tags: [Volumes]
      summary: Volume detail
      description: |
        Returns the volume and a list of services using it.
        Note: volumes are keyed by name, not ID.
      parameters:
        - name: name
          in: path
          required: true
          description: Volume name
          schema:
            type: string
      responses:
        "200":
          description: Volume detail with cross-referenced services
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      volume:
                        type: object
                        description: Docker volume.Volume object
                      services:
                        type: array
                        items:
                          $ref: "#/components/schemas/ServiceRef"
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: removeVolume
      tags: [Volumes]
      summary: Remove a volume
      description: Removes a volume. Fails if the volume is in use by a container. Requires operations level 3.
      parameters:
        - name: name
          in: path
          required: true
          description: Volume name
          schema:
            type: string
      responses:
        "204":
          description: Volume removed
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Search ───────────────────────────────────────────────────────────

  /search:
    get:
      operationId: search
      tags: [Search]
      summary: Global cross-resource search
      description: |
        Searches names, images, and labels across all resource types.
        Results are grouped by type. The `limit` parameter controls max results
        per type (default 3; 0 means up to 1000 per type).
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (case-insensitive substring match, max 200 chars)
          schema:
            type: string
            maxLength: 200
        - name: limit
          in: query
          description: Max results per resource type (0 = up to 1000)
          schema:
            type: integer
            default: 3
            minimum: 0
      responses:
        "200":
          description: Grouped search results
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "304":
          $ref: "#/components/responses/NotModified"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Topology ─────────────────────────────────────────────────────────

  /topology/networks:
    get:
      operationId: getNetworkTopology
      tags: [Topology]
      summary: Network topology graph
      description: |
        Returns a graph of services connected by shared overlay networks.
        Nodes are services, edges represent shared network membership.
      responses:
        "200":
          description: Network topology
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkTopology"
        "304":
          $ref: "#/components/responses/NotModified"

  /topology/placement:
    get:
      operationId: getPlacementTopology
      tags: [Topology]
      summary: Task placement topology
      description: |
        Returns cluster nodes with their assigned tasks,
        for visualizing task placement across the swarm.
      responses:
        "200":
          description: Placement topology
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlacementTopology"
        "304":
          $ref: "#/components/responses/NotModified"

# ════════════════════════════════════════════════════════════════════════
# Components
# ════════════════════════════════════════════════════════════════════════

components:

  # ── Security Schemes ────────────────────────────────────────────────

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-cetacean_session
      description: Session cookie set after OIDC authentication
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token for machine-to-machine OIDC authentication

  # ── Parameters ───────────────────────────────────────────────────────

  parameters:
    resourceId:
      name: id
      in: path
      required: true
      description: Resource ID
      schema:
        type: string

    search:
      name: search
      in: query
      description: Case-insensitive substring search on resource names
      schema:
        type: string

    filter:
      name: filter
      in: query
      description: |
        expr-lang filter expression (max 512 characters).
        Available fields depend on the resource type.
      schema:
        type: string
        maxLength: 512

    limit:
      name: limit
      in: query
      description: Page size
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

    offset:
      name: offset
      in: query
      description: Starting offset for pagination
      schema:
        type: integer
        minimum: 0
        default: 0

    dir:
      name: dir
      in: query
      description: Sort direction
      schema:
        type: string
        enum: [asc, desc]
        default: asc

    logLimit:
      name: limit
      in: query
      description: Max log lines to return (JSON mode only)
      schema:
        type: integer
        minimum: 1
        maximum: 10000
        default: 500

    logAfter:
      name: after
      in: query
      description: |
        Return lines after this timestamp (RFC 3339 or Go duration).
        For SSE, Last-Event-ID header is used as fallback.
      schema:
        type: string

    logBefore:
      name: before
      in: query
      description: |
        Return lines before this timestamp (RFC 3339 or Go duration).
        Not supported for SSE streams (returns 400).
      schema:
        type: string

    logStream:
      name: stream
      in: query
      description: Filter by output stream
      schema:
        type: string
        enum: [stdout, stderr]

  # ── Headers ──────────────────────────────────────────────────────────

  headers:
    ETag:
      description: Weak ETag for conditional requests (use with If-None-Match)
      schema:
        type: string
        example: '"w/abc123"'

    Link:
      description: RFC 8288 pagination links (rel="next", rel="prev")
      schema:
        type: string
        example: '</nodes?limit=50&offset=50>; rel="next"'

    Retry-After:
      description: Seconds to wait before retrying
      schema:
        type: integer
        example: 5

  # ── Responses ────────────────────────────────────────────────────────

  responses:
    NotModified:
      description: Not modified (ETag matched If-None-Match)

    BadRequest:
      description: Bad request (invalid filter, missing parameter, etc.)
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    NotAcceptable:
      description: Requested content type not supported for this endpoint
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    Conflict:
      description: Version conflict — the resource was modified concurrently; retry the operation
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    UnsupportedMediaType:
      description: Unsupported Content-Type for this endpoint
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

    TooManyRequests:
      description: Too many concurrent connections
      headers:
        Retry-After:
          $ref: "#/components/headers/Retry-After"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"

  # ── Schemas ──────────────────────────────────────────────────────────

  schemas:

    # ── Error ────────────────────────────────────────────────────────

    ProblemDetail:
      type: object
      description: |
        RFC 9457 Problem Details with JSON-LD @context.
        Domain-specific errors use `/api/errors/{code}` as the type URI
        (e.g. `/api/errors/SVC001`). Generic errors use `about:blank`.
      required: [type, title, status]
      properties:
        "@context":
          type: string
          example: /api/context.jsonld
        type:
          type: string
          description: "Problem type URI — `/api/errors/{code}` for domain errors, `about:blank` for generic"
          example: /api/errors/SVC001
        title:
          type: string
          description: Short human-readable summary
          example: Service Version Conflict
        status:
          type: integer
          description: HTTP status code
          example: 409
        detail:
          type: string
          description: Human-readable explanation
        instance:
          type: string
          description: Request path that generated the error
        requestId:
          type: string
          description: Correlation ID for this request

    ErrorDef:
      type: object
      description: Documentation for a well-known error code
      required: [code, title, status, description, suggestion]
      properties:
        code:
          type: string
          description: "Stable error code (three-letter prefix + three-digit number)"
          example: SVC001
        title:
          type: string
          description: Short human-readable title
          example: Service Version Conflict
        status:
          type: integer
          description: HTTP status code this error produces
          example: 409
        description:
          type: string
          description: Detailed explanation of the error
        suggestion:
          type: string
          description: Recommended action to resolve the error

    # ── JSON-LD Envelopes ────────────────────────────────────────────

    DetailEnvelope:
      type: object
      description: JSON-LD wrapper for detail endpoints
      properties:
        "@context":
          type: string
          example: /api/context.jsonld
        "@id":
          type: string
          description: Canonical path of this resource
          example: /nodes/abc123
        "@type":
          type: string
          description: Resource type name
          example: Node

    CollectionEnvelope:
      type: object
      description: JSON-LD wrapper for list endpoints
      required: [items, total, limit, offset]
      properties:
        "@context":
          type: string
          example: /api/context.jsonld
        "@type":
          type: string
          example: Collection
        items:
          type: array
          items: {}
        total:
          type: integer
          description: Total number of items matching the query
        limit:
          type: integer
          description: Page size used
        offset:
          type: integer
          description: Starting offset used

    # ── Collections ──────────────────────────────────────────────────

    NodeCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
                description: Docker swarm.Node object

    ServiceCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ServiceListItem"

    TaskCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/EnrichedTask"

    StackCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Stack"

    ConfigCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
                description: Docker swarm.Config object

    SecretCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
                description: Docker swarm.Secret object (data always nil)

    NetworkCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
                description: Docker network.Summary object

    VolumeCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
                description: Docker volume.Volume object

    HistoryCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/HistoryEntry"

    DiskUsageCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/DiskUsageSummary"

    PluginCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
                description: Docker Plugin object

    StackSummaryCollection:
      allOf:
        - $ref: "#/components/schemas/CollectionEnvelope"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/StackSummary"

    # ── Resource Types ───────────────────────────────────────────────

    ServiceRef:
      type: object
      description: Lightweight service cross-reference
      properties:
        "@id":
          type: string
          description: Canonical path
          example: /services/abc123
        id:
          type: string
        name:
          type: string

    ServiceListItem:
      type: object
      description: Service with running task count (extends Docker swarm.Service)
      properties:
        ID:
          type: string
        Spec:
          type: object
          description: Docker ServiceSpec
        RunningTasks:
          type: integer
          description: Number of currently running tasks

    EnrichedTask:
      type: object
      description: Docker swarm.Task with added ServiceName and NodeHostname
      properties:
        ID:
          type: string
        ServiceID:
          type: string
        NodeID:
          type: string
        Status:
          type: object
          description: Docker TaskStatus
        ServiceName:
          type: string
          description: Resolved from cache
        NodeHostname:
          type: string
          description: Resolved from cache

    Stack:
      type: object
      properties:
        name:
          type: string
        services:
          type: array
          items:
            type: string
          description: Service IDs
        configs:
          type: array
          items:
            type: string
          description: Config IDs
        secrets:
          type: array
          items:
            type: string
          description: Secret IDs
        networks:
          type: array
          items:
            type: string
          description: Network IDs
        volumes:
          type: array
          items:
            type: string
          description: Volume names

    StackDetail:
      type: object
      description: Full stack with resolved resources
      properties:
        name:
          type: string
        services:
          type: array
          items:
            type: object
            description: Docker swarm.Service objects
        configs:
          type: array
          items:
            type: object
            description: Docker swarm.Config objects
        secrets:
          type: array
          items:
            type: object
            description: Docker swarm.Secret objects (data redacted)
        networks:
          type: array
          items:
            type: object
            description: Docker network.Summary objects
        volumes:
          type: array
          items:
            type: object
            description: Docker volume.Volume objects

    StackSummary:
      type: object
      properties:
        name:
          type: string
        serviceCount:
          type: integer
        configCount:
          type: integer
        secretCount:
          type: integer
        networkCount:
          type: integer
        volumeCount:
          type: integer
        desiredTasks:
          type: integer
        tasksByState:
          type: object
          additionalProperties:
            type: integer
        updatingServices:
          type: integer
        memoryLimitBytes:
          type: integer
          format: int64
        cpuLimitCores:
          type: number
          format: double
        memoryUsageBytes:
          type: integer
          format: int64
          description: Populated from Prometheus (0 if unavailable)
        cpuUsagePercent:
          type: number
          format: double
          description: Populated from Prometheus (0 if unavailable)

    # ── Cluster ──────────────────────────────────────────────────────

    ClusterSnapshot:
      type: object
      properties:
        nodeCount:
          type: integer
        serviceCount:
          type: integer
        taskCount:
          type: integer
        stackCount:
          type: integer
        tasksByState:
          type: object
          additionalProperties:
            type: integer
        nodesReady:
          type: integer
        nodesDown:
          type: integer
        nodesDraining:
          type: integer
        totalCPU:
          type: integer
        totalMemory:
          type: integer
          format: int64
        servicesConverged:
          type: integer
        servicesDegraded:
          type: integer
        reservedCPU:
          type: integer
          format: int64
        reservedMemory:
          type: integer
          format: int64
        maxNodeCPU:
          type: integer
          description: CPU cores of the largest single node
        maxNodeMemory:
          type: integer
          format: int64
          description: Memory bytes of the largest single node
        lastSync:
          type: string
          format: date-time
        prometheusConfigured:
          type: boolean
        localNodeID:
          type: string

    ClusterCapacity:
      type: object
      properties:
        maxNodeCPU:
          type: integer
          description: CPU cores of the largest single node
        maxNodeMemory:
          type: integer
          format: int64
          description: Memory bytes of the largest single node
        totalCPU:
          type: integer
          description: Total CPU cores across all nodes
        totalMemory:
          type: integer
          format: int64
          description: Total memory bytes across all nodes
        nodeCount:
          type: integer
          description: Number of nodes in the cluster

    ClusterMetrics:
      type: object
      properties:
        cpu:
          $ref: "#/components/schemas/ResourceMetric"
        memory:
          $ref: "#/components/schemas/ResourceMetric"
        disk:
          $ref: "#/components/schemas/ResourceMetric"

    ResourceMetric:
      type: object
      properties:
        used:
          type: number
          format: double
        total:
          type: number
          format: double
        percent:
          type: number
          format: double

    DiskUsageSummary:
      type: object
      properties:
        type:
          type: string
          enum: [images, containers, volumes, buildCache]
        count:
          type: integer
        active:
          type: integer
        totalSize:
          type: integer
          format: int64
        reclaimable:
          type: integer
          format: int64

    MonitoringStatus:
      type: object
      properties:
        prometheusConfigured:
          type: boolean
        prometheusReachable:
          type: boolean
        nodeExporter:
          $ref: "#/components/schemas/TargetStatus"
        cadvisor:
          $ref: "#/components/schemas/TargetStatus"

    TargetStatus:
      type: object
      properties:
        targets:
          type: integer
          description: Number of active targets detected
        nodes:
          type: integer
          description: Total nodes in the cluster (for comparison)

    # ── History ──────────────────────────────────────────────────────

    HistoryEntry:
      type: object
      properties:
        id:
          type: integer
          format: uint64
        timestamp:
          type: string
          format: date-time
        type:
          type: string
          description: Resource type (node, service, task, etc.)
        action:
          type: string
          description: Change action (set, delete)
        resourceId:
          type: string
        name:
          type: string
        summary:
          type: string

    # ── Logs ─────────────────────────────────────────────────────────

    LogResponse:
      type: object
      properties:
        lines:
          type: array
          items:
            $ref: "#/components/schemas/LogLine"
        oldest:
          type: string
          description: Timestamp of the oldest line returned
        newest:
          type: string
          description: Timestamp of the newest line returned
        hasMore:
          type: boolean
          description: Whether more lines exist beyond the limit

    LogLine:
      type: object
      properties:
        timestamp:
          type: string
          description: RFC 3339 Nano timestamp
        message:
          type: string
        stream:
          type: string
          enum: [stdout, stderr]
        attrs:
          type: object
          additionalProperties:
            type: string
          description: Docker log attributes (e.g. task ID)

    # ── SSE ──────────────────────────────────────────────────────────

    SSEEvent:
      type: object
      description: |
        JSON payload of an SSE event. Single events have `event: <type>`,
        batched events have `event: batch` with an array of these objects.
      properties:
        "@id":
          type: string
          description: Canonical resource path
        "@type":
          type: string
          description: Resource type (Node, Service, Task, etc.)
        type:
          type: string
          description: Event type string (node, service, task, etc.)
        action:
          type: string
          description: Event action (set, delete)
        id:
          type: string
          description: Resource ID
        resource:
          type: object
          description: The full resource object (type varies by event type)

    # ── Search ───────────────────────────────────────────────────────

    SearchResponse:
      type: object
      properties:
        "@context":
          type: string
          example: /api/context.jsonld
        "@id":
          type: string
          example: /search
        "@type":
          type: string
          example: SearchResult
        query:
          type: string
        results:
          type: object
          description: Grouped results keyed by resource type
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/SearchResult"
        counts:
          type: object
          description: Total match count per type (may exceed returned results)
          additionalProperties:
            type: integer
        total:
          type: integer
          description: Total matches across all types

    SearchResult:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        detail:
          type: string
          description: Context-dependent detail (image, driver, date, etc.)
        state:
          type: string
          description: Present for services and tasks

    # ── Topology ─────────────────────────────────────────────────────

    NetworkTopology:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/TopoServiceNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/TopoEdge"
        networks:
          type: array
          items:
            $ref: "#/components/schemas/TopoNetwork"

    TopoServiceNode:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        stack:
          type: string
        replicas:
          type: integer
        image:
          type: string
        ports:
          type: array
          items:
            type: string
        mode:
          type: string
          enum: [replicated, global]
        updateStatus:
          type: string
        networkAliases:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    TopoEdge:
      type: object
      properties:
        source:
          type: string
          description: Service ID
        target:
          type: string
          description: Service ID
        networks:
          type: array
          items:
            type: string
          description: Shared network IDs

    TopoNetwork:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        driver:
          type: string
        scope:
          type: string
        stack:
          type: string

    PlacementTopology:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/TopoClusterNode"

    TopoClusterNode:
      type: object
      properties:
        id:
          type: string
        hostname:
          type: string
        role:
          type: string
        state:
          type: string
        availability:
          type: string
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/TopoTask"

    TopoTask:
      type: object
      properties:
        id:
          type: string
        serviceId:
          type: string
        serviceName:
          type: string
        state:
          type: string
        slot:
          type: integer
        image:
          type: string

    Identity:
      type: object
      required:
        - subject
        - displayName
        - provider
      properties:
        subject:
          type: string
          description: Unique identifier for the user/machine
        displayName:
          type: string
          description: Human-friendly display name
        email:
          type: string
          description: Email address (if available)
        groups:
          type: array
          items:
            type: string
          description: Group memberships (if available)
        provider:
          type: string
          enum: [none, oidc, tailscale, cert, headers]
          description: Authentication provider that produced this identity
        raw:
          type: object
          additionalProperties: true
          description: All raw claims from the authentication provider

    # ── Write operation schemas ───────────────────────────────────────

    JSONPatch:
      type: array
      description: JSON Patch document (RFC 6902)
      items:
        type: object
        required: [op, path]
        properties:
          op:
            type: string
            enum: [add, remove, replace, test]
            description: Patch operation
          path:
            type: string
            description: Key name (with or without leading /)
          value:
            type: string
            description: New value (required for add/replace/test)

    ServiceResources:
      type: object
      description: CPU and memory resource requirements for a service
      properties:
        cpuLimit:
          type: integer
          format: int64
          description: CPU limit in nanoCPUs (null to unset)
          nullable: true
        cpuReservation:
          type: integer
          format: int64
          description: CPU reservation in nanoCPUs (null to unset)
          nullable: true
        memoryLimit:
          type: integer
          format: int64
          description: Memory limit in bytes (null to unset)
          nullable: true
        memoryReservation:
          type: integer
          format: int64
          description: Memory reservation in bytes (null to unset)
          nullable: true

    ServicePlacement:
      type: object
      description: Placement constraints and preferences for a service
      properties:
        placement:
          type: object
          description: Docker swarm placement configuration
          properties:
            Constraints:
              type: array
              items:
                type: string
              description: Placement constraint expressions (e.g. "node.role == manager")
            Preferences:
              type: array
              description: Placement preference strategies
              items:
                type: object
            MaxReplicas:
              type: integer
              format: int64
              description: Maximum replicas per node (0 = unlimited)
            Platforms:
              type: array
              description: Target platforms
              items:
                type: object

    ServicePorts:
      type: object
      description: Published port configurations for a service
      properties:
        ports:
          type: array
          items:
            type: object
            description: Docker swarm PortConfig
            properties:
              Protocol:
                type: string
                enum: [tcp, udp, sctp]
              TargetPort:
                type: integer
                format: int64
              PublishedPort:
                type: integer
                format: int64
              PublishMode:
                type: string
                enum: [ingress, host]

    ServiceUpdatePolicy:
      type: object
      description: Rolling update configuration for a service
      properties:
        parallelism:
          type: integer
          format: int64
          description: Number of tasks to update simultaneously
        delay:
          type: integer
          format: int64
          description: Delay between updates in nanoseconds
        failureAction:
          type: string
          enum: [continue, pause, rollback]
        monitor:
          type: integer
          format: int64
          description: Duration after each task update to monitor for failure (nanoseconds)
        maxFailureRatio:
          type: number
          format: float
          description: Fraction of tasks that may fail during an update
        order:
          type: string
          enum: [stop-first, start-first]

    ServiceRollbackPolicy:
      type: object
      description: Rollback configuration for a service
      properties:
        parallelism:
          type: integer
          format: int64
          description: Number of tasks to roll back simultaneously
        delay:
          type: integer
          format: int64
          description: Delay between rollback steps in nanoseconds
        failureAction:
          type: string
          enum: [continue, pause]
        monitor:
          type: integer
          format: int64
          description: Duration after each task rollback to monitor for failure (nanoseconds)
        maxFailureRatio:
          type: number
          format: float
          description: Fraction of tasks that may fail during a rollback
        order:
          type: string
          enum: [stop-first, start-first]

    ServiceLogDriver:
      type: object
      description: Log driver configuration for a service
      properties:
        logDriver:
          type: object
          description: Docker driver configuration
          nullable: true
          properties:
            Name:
              type: string
              description: Log driver name (e.g. "json-file", "syslog", "none")
            Options:
              type: object
              additionalProperties:
                type: string
              description: Log driver options
