      responses:
        "200":
          description: Paginated service list
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            Link:
              $ref: "#/components/headers/Link"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceCollection"
        "304":
          $ref: "#/components/responses/NotModified"
        "400":
          $ref: "#/components/responses/BadRequest"

  /services/{id}:
    get:
      operationId: getService
      tags: [Services]
      summary: Service detail
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Service detail
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      service:
                        type: object
                        description: Docker swarm.Service object
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: removeService
      tags: [Services]
      summary: Remove a service
      description: Removes a service from the swarm. Requires operations level 3.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "204":
          description: Service removed
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"

