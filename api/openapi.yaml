                  ReadOnly: false
      responses:
        "200":
          description: Updated mount configuration
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      mounts:
                        type: array
                        items:
                          type: object
                          description: Docker mount.Mount object
        "400":
