          description: Service detail
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      service:
                        type: object
                        description: Docker swarm.Service object
                      integrations:
                        type: array
                        description: Detected third-party integrations (e.g. Traefik)
                        items:
                          $ref: "#/components/schemas/Integration"
              example:
                "@context": /api/context.jsonld
                "@id": /services/r8m2x5nk3p7q
                "@type": Service
                service:
                  ID: r8m2x5nk3p7q
                  Version: { Index: 156 }
                  Spec:
                    Name: webapp
                    Labels:
                      com.docker.stack.namespace: myapp
                    TaskTemplate:
                      ContainerSpec:
                        Image: nginx:1.27@sha256:abc123...
                        Env: [NODE_ENV=production]
                        Healthcheck:
                          Test: [CMD, curl, -f, http://localhost/]
                          Interval: 30000000000
                          Timeout: 5000000000
                          Retries: 3
                      Resources:
                        Limits: { NanoCPUs: 1000000000, MemoryBytes: 536870912 }
                        Reservations: { NanoCPUs: 500000000, MemoryBytes: 268435456 }
                      RestartPolicy:
                        Condition: on-failure
                        MaxAttempts: 3
                    Mode:
                      Replicated: { Replicas: 3 }
                    UpdateConfig:
                      Parallelism: 1
                      Delay: 10000000000
                      FailureAction: rollback
                    EndpointSpec:
                      Ports:
                        - Protocol: tcp
                          TargetPort: 80
                          PublishedPort: 8080
                          PublishMode: ingress
                  Endpoint:
                    Ports:
                      - Protocol: tcp
                        TargetPort: 80
                        PublishedPort: 8080
                        PublishMode: ingress
                integrations: []
            application/atom+xml:
              schema:
                $ref: "#/components/schemas/AtomFeed"
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/NotFound"
