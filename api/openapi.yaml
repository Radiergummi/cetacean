openapi: "3.1.0"
info:
  title: Cetacean API
  version: "1.0"
  description: |
    Observability and management API for Docker Swarm Mode clusters.
    For a detailed walkthrough of conventions, query parameters, SSE streaming, and write operations, see the [API Guide](/api).

    Uses content negotiation — same URLs serve JSON, HTML (SPA), or SSE based on
    the Accept header. Append `.json` or `.html` to any path to force a content type.

    All collection responses include JSON-LD `@context` and `@type` fields.
    Detail responses include `@context`, `@id`, and `@type`.
    Error responses follow RFC 9457 (Problem Details).

    Every response (except `/-/` meta endpoints) includes:
    - `Link: </api>; rel="service-desc"` — pointer to this spec
    - `Link: </api/context.jsonld>; rel="describedby"` — JSON-LD context
    - `Vary: Accept` — content negotiation indicator

servers:
  - url: /

security:
  - cookieAuth: []
  - bearerAuth: []
  - {} # Allow unauthenticated (none mode)

tags:
  - name: Meta
    description: Health checks and operational endpoints (no content negotiation, no discovery links)
  - name: Authentication
    description: Authentication endpoints (OIDC login flow, identity)
  - name: Cluster
    description: Cluster-wide information, swarm config, disk usage, and plugins
  - name: Plugins
    description: Docker plugin management (install, enable, disable, upgrade, configure, remove)
  - name: Nodes
    description: Swarm nodes
  - name: Services
    description: Swarm services
  - name: Tasks
    description: Swarm tasks (enriched with ServiceName and NodeHostname)
  - name: Stacks
    description: Derived stacks (from com.docker.stack.namespace labels)
  - name: Configs
    description: Swarm configs
  - name: Secrets
    description: Swarm secrets (data always redacted)
  - name: Networks
    description: Docker networks
  - name: Volumes
    description: Docker volumes
  - name: Search
    description: Cross-resource global search
  - name: History
    description: Resource change history (ring buffer)
  - name: Topology
    description: Network and placement topology views
  - name: Monitoring
    description: Prometheus metrics proxy and monitoring status
  - name: Events
    description: Real-time SSE event stream
  - name: Documentation
    description: API spec and JSON-LD context

paths:
  # ── Meta ──────────────────────────────────────────────────────────────

  /-/health:
    get:
      operationId: getHealth
      tags: [Meta]
      summary: Health check
      description: Always returns 200 with version info. No content negotiation.
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                  commit:
                    type: string
                  buildDate:
                    type: string
                  operationsLevel:
                    type: integer
                    description: Configured write operations level (0=read-only, 1=operational, 2=configuration, 3=impactful)
                    example: 1
              example:
                status: ok
                version: 0.11.0
                commit: 607a5c7
                buildDate: "2025-03-15T10:00:00Z"
                operationsLevel: 1

  /-/ready:
    get:
      operationId: getReady
      tags: [Meta]
      summary: Readiness check
      description: |
        Returns 200 after the initial Docker sync completes,
        503 while still syncing.
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
        "503":
          description: Not ready (initial sync in progress)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: not_ready

  /-/metrics:
    get:
      operationId: getSelfMetrics
      tags: [Monitoring]
      summary: Cetacean's own Prometheus metrics
      description: >
        Serves Prometheus exposition format with Cetacean's operational metrics
        (HTTP requests, SSE connections, cache state, etc.).
        Disabled when CETACEAN_SELF_METRICS=false.
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

  /metrics/status:
    get:
      operationId: getMonitoringStatus
      tags: [Monitoring]
      summary: Monitoring auto-detection status
      description: |
        Probes Prometheus for node-exporter and cAdvisor targets.
        Returns detection status for the guided setup UI.
      responses:
        "200":
          description: Monitoring status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonitoringStatus"
              example:
                prometheusConfigured: true
                prometheusReachable: true
                nodeExporter:
                  targets: 3
                  nodes: 3
                cadvisor:
                  targets: 3
                  nodes: 3

  /metrics/labels:
    get:
      operationId: getMetricsLabels
      tags: [Monitoring]
      summary: Prometheus label names
      description: |
        Proxied Prometheus label names endpoint. Returns all known label names,
        optionally filtered by series selectors via `match[]`.
      parameters:
        - name: match[]
          in: query
          description: Series selector(s) to filter labels by
          schema:
            type: string
          example: 'up{job="node-exporter"}'
        - name: start
          in: query
          description: Start of the time range to consider (RFC 3339 or Unix timestamp)
          schema:
            type: string
          example: "2026-04-13T00:00:00Z"
        - name: end
          in: query
          description: End of the time range to consider (RFC 3339 or Unix timestamp)
          schema:
            type: string
          example: "2026-04-13T01:00:00Z"
      responses:
        "200":
          description: Label names
          content:
            application/json:
              schema:
                type: object
                description: Prometheus labels response (proxied as-is)
        "503":
          description: Prometheus not configured

  /metrics/labels/{name}:
    get:
      operationId: getMetricsLabelValues
      tags: [Monitoring]
      summary: Prometheus label values
      description: |
        Proxied Prometheus label values endpoint. Returns all known values
        for a given label name, optionally filtered by series selectors via `match[]`.
      parameters:
        - name: name
          in: path
          required: true
          description: Label name
          schema:
            type: string
          example: instance
        - name: match[]
          in: query
          description: Series selector(s) to filter values by
          schema:
            type: string
          example: 'up{job="node-exporter"}'
      responses:
        "200":
          description: Label values
          content:
            application/json:
              schema:
                type: object
                description: Prometheus label values response (proxied as-is)
        "400":
          $ref: "#/components/responses/BadRequest"
        "503":
          description: Prometheus not configured

  /-/docker-latest-version:
    get:
      operationId: getDockerLatestVersion
      tags: [Meta]
      summary: Latest Docker Engine version
      description: Returns the latest stable Docker Engine version from the GitHub releases API. Cached.
      responses:
        "200":
          description: Latest version info
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    example: "27.5.1"

  /metrics:
    get:
      operationId: getMetrics
      tags: [Monitoring]
      summary: Prometheus query (content-negotiated)
      description: |
        Content-negotiated Prometheus query endpoint.
        - `application/json`: proxied query result (instant or range based on parameters)
        - `text/event-stream`: SSE stream of periodic instant query results
        - `text/html`: metrics console SPA

        Instant vs range is determined by presence of `start`+`end` parameters.
        Returns 503 if Prometheus is not configured.
      parameters:
        - name: query
          in: query
          required: true
          description: PromQL query expression
          schema:
            type: string
          example: 'sum(rate(container_cpu_usage_seconds_total[5m])) by (container_label_com_docker_swarm_service_name)'
        - name: time
          in: query
          description: Evaluation timestamp (instant queries)
          schema:
            type: string
          example: "2026-04-13T12:00:00Z"
        - name: start
          in: query
          description: Range start timestamp (triggers range query)
          schema:
            type: string
          example: "2026-04-13T11:00:00Z"
        - name: end
          in: query
          description: Range end timestamp (triggers range query)
          schema:
            type: string
          example: "2026-04-13T12:00:00Z"
        - name: step
          in: query
          description: Query resolution step width (range queries and SSE)
          schema:
            type: string
          example: 60s
        - name: range
          in: query
          description: Lookback duration in seconds (SSE initial range query)
          schema:
            type: string
          example: "3600"
      responses:
        "200":
          description: Prometheus query result or SSE stream
          content:
            application/json:
              schema:
                type: object
                description: Prometheus query result (proxied as-is)
            text/event-stream:
              schema:
                type: object
                description: |
                  SSE stream with `initial` (full range) and `point` (single value) events
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          description: Prometheus not configured

  # ── Authentication ──────────────────────────────────────────────────

  /profile:
    get:
      operationId: getProfile
      tags: [Authentication]
      summary: Current user profile
      description: |
        Content-negotiated identity endpoint. Returns the authenticated user's
        identity as JSON (with ETag), or serves the SPA for browser requests.

        Unlike `/auth/whoami`, this endpoint is content-negotiated and includes
        `Cache-Control: no-store`.
      responses:
        "200":
          description: Authenticated user identity
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - $ref: "#/components/schemas/Identity"
                  - type: object
                    properties:
                      permissions:
                        type: object
                        additionalProperties:
                          type: array
                          items:
                            type: string
                        description: Per-resource permission map (present when ACL is active)
        "304":
          $ref: "#/components/responses/NotModified"
        "401":
          description: Not authenticated

  /auth/whoami:
    get:
      summary: Get current identity
      operationId: whoami
      tags: [Authentication]
      responses:
        "200":
          description: Current user identity
          headers:
            Cache-Control:
              schema:
                type: string
                example: no-store
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - $ref: "#/components/schemas/Identity"
              example:
                "@context": /api/context.jsonld
                "@id": /auth/whoami
                "@type": Identity
                subject: user@example.com
                displayName: Jane Doe
                email: user@example.com
                groups: [engineering, ops]
                provider: oidc
        "401":
          description: Not authenticated

  /auth/login:
    get:
      summary: Initiate OIDC login
      operationId: authLogin
      tags: [Authentication]
      description: Redirects to OIDC provider for authentication. Only available in OIDC mode.
      parameters:
        - name: redirect
          in: query
          description: URL to redirect to after login
          schema:
            type: string
          example: /services
      responses:
        "302":
          description: Redirect to OIDC provider

  /auth/callback:
    get:
      summary: OIDC callback
      operationId: authCallback
      tags: [Authentication]
      description: Handles the OIDC authorization code callback. Only available in OIDC mode.
      parameters:
        - name: code
          in: query
          required: true
          description: Authorization code returned by the OIDC provider
          schema:
            type: string
          example: 4/0AY0e-g7...
        - name: state
          in: query
          required: true
          description: Opaque state parameter that must match the value sent in the initial authorization request
          schema:
            type: string
          example: af0ifjsldkj
      responses:
        "302":
          description: Redirect to original URL after successful authentication
        "400":
          description: Invalid state parameter

  /auth/logout:
    post:
      summary: Logout
      operationId: authLogout
      tags: [Authentication]
      description: Clears the session cookie and redirects to home.
      responses:
        "302":
          description: Redirect to home

  # ── Documentation ────────────────────────────────────────────────────

  /api:
    get:
      operationId: getApiDoc
      tags: [Documentation]
      summary: API documentation
      description: |
        Content-negotiated. HTML requests get the Scalar API playground;
        all other requests get this OpenAPI spec as YAML.
      responses:
        "200":
          description: API documentation
          content:
            application/yaml:
              schema:
                type: string
            text/html:
              schema:
                type: string

  /api/context.jsonld:
    get:
      operationId: getJsonLdContext
      tags: [Documentation]
      summary: JSON-LD context document
      description: Defines the vocabulary for JSON-LD terms used in responses.
      responses:
        "200":
          description: JSON-LD context
          content:
            application/ld+json:
              schema:
                type: object

  /api/errors:
    get:
      operationId: listErrorCodes
      tags: [Documentation]
      summary: Error code reference
      description: |
        Lists all well-known error codes with their titles, HTTP status codes,
        descriptions, and suggestions. Browser requests (Accept: text/html) serve
        the SPA error reference page.
      responses:
        "200":
          description: Collection of error definitions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/CollectionEnvelope"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/ErrorDef"
              example:
                "@context": /api/context.jsonld
                "@type": Collection
                items:
                  - code: SVC001
                    title: Service Version Conflict
                    status: 409
                    description: The service was modified by another request since you last read it.
                    suggestion: Re-read the service and retry the operation.
                  - code: OPS001
                    title: Operations Level Too Low
                    status: 403
                    description: This write operation requires a higher operations level.
                    suggestion: Increase the operations level or contact an administrator.
                total: 2
                limit: 2
                offset: 0

  /api/errors/{code}:
    get:
      operationId: getErrorCode
      tags: [Documentation]
      summary: Error code detail
      description: |
        Returns documentation for a single error code including its title,
        HTTP status, description, and suggested resolution.
      parameters:
        - name: code
          in: path
          required: true
          description: "Error code (e.g. SVC001, NOD003)"
          schema:
            type: string
            pattern: "^[A-Z]{3}\\d{3}$"
            example: SVC001
      responses:
        "200":
          description: Error definition
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - $ref: "#/components/schemas/ErrorDef"
              example:
                "@context": /api/context.jsonld
                "@id": /api/errors/SVC001
                "@type": ErrorDef
                code: SVC001
                title: Service Version Conflict
                status: 409
                description: The service was modified by another request since you last read it.
                suggestion: Re-read the service and retry the operation.
        "404":
          description: Unknown error code

  # ── Events ───────────────────────────────────────────────────────────

  /events:
    get:
      operationId: getEvents
      tags: [Events]
      summary: Real-time SSE event stream
      description: |
        Server-Sent Events stream of resource changes. Requires `Accept: text/event-stream`.
        HTML requests get the SPA; JSON requests get 406.

        Events are batched within the configured interval (default 100 ms).
        Single events use `event: <type>` (node, service, task, etc.).
        Batched events use `event: batch` with an array payload.

        Max 256 concurrent SSE clients. Returns 429 with Retry-After when exceeded.
      parameters:
        - name: types
          in: query
          description: Comma-separated event types to subscribe to
          schema:
            type: string
            example: node,service,task
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SSEEvent"
            application/atom+xml:
              schema:
                $ref: "#/components/schemas/AtomFeed"
        "406":
          $ref: "#/components/responses/NotAcceptable"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ── Cluster ──────────────────────────────────────────────────────────

  /cluster:
    get:
      operationId: getCluster
      tags: [Cluster]
      summary: Cluster overview
      description: Aggregated counts and status of all swarm resources.
      responses:
        "200":
          description: Cluster snapshot
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - $ref: "#/components/schemas/ClusterSnapshot"
              example:
                "@context": /api/context.jsonld
                "@id": /cluster
                "@type": Cluster
                nodeCount: 3
                serviceCount: 12
                taskCount: 42
                stackCount: 4
                tasksByState:
                  running: 38
                  complete: 3
                  failed: 1
                nodesReady: 3
                nodesDown: 0
                nodesDraining: 0
                totalCPU: 12
                totalMemory: 25769803776
                servicesConverged: 11
                servicesDegraded: 1
                reservedCPU: 8000000000
                reservedMemory: 17179869184
                lastSync: "2025-03-20T14:30:00Z"
                prometheusConfigured: true
        "304":
          $ref: "#/components/responses/NotModified"

  /cluster/metrics:
    get:
      operationId: getClusterMetrics
      tags: [Cluster]
      summary: Cluster resource utilization
      description: |
        CPU, memory, and disk utilization from Prometheus.
        Returns 404 if Prometheus is not configured.
      responses:
        "200":
          description: Cluster metrics
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - $ref: "#/components/schemas/ClusterMetrics"
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/NotFound"

  /cluster/capacity:
    get:
      operationId: getClusterCapacity
      tags: [Cluster]
      summary: Cluster resource capacity
      description: |
        Max single-node CPU and memory (for slider bounds) plus cluster-wide totals.
      responses:
        "200":
          description: Cluster capacity
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - $ref: "#/components/schemas/ClusterCapacity"
              example:
                "@context": /api/context.jsonld
                "@id": /cluster/capacity
                "@type": ClusterCapacity
                maxNodeCPU: 8
                maxNodeMemory: 17179869184
                totalCPU: 12
                totalMemory: 25769803776
                nodeCount: 3
        "304":
          $ref: "#/components/responses/NotModified"

  /swarm:
    get:
      operationId: getSwarm
      tags: [Cluster]
      summary: Swarm configuration
      description: Full swarm inspect result with join tokens, raft config, etc.
      responses:
        "200":
          description: Swarm info
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      swarm:
                        type: object
                        description: Docker swarm.Swarm object
                      managerAddr:
                        type: string
                        description: Address of the leader manager node
              example:
                "@context": /api/context.jsonld
                "@id": /swarm
                "@type": Swarm
                swarm:
                  ID: abc123def456ghi789jkl012mno345pq
                  Version: { Index: 412 }
                  CreatedAt: "2025-09-12T14:23:01.123456789Z"
                  UpdatedAt: "2026-04-13T10:15:22.987654321Z"
                  Spec:
                    Name: default
                    Orchestration:
                      TaskHistoryRetentionLimit: 5
                    Raft:
                      SnapshotInterval: 10000
                      KeepOldSnapshots: 0
                      LogEntriesForSlowFollowers: 500
                      ElectionTick: 10
                      HeartbeatTick: 1
                    Dispatcher:
                      HeartbeatPeriod: 5000000000
                    CAConfig:
                      NodeCertExpiry: 7776000000000000
                    EncryptionConfig:
                      AutoLockManagers: false
                  JoinTokens:
                    Worker: SWMTKN-1-abc...-def
                    Manager: SWMTKN-1-abc...-xyz
                managerAddr: 10.0.0.1:2377
        "304":
          $ref: "#/components/responses/NotModified"

  /swarm/orchestration:
    patch:
      operationId: patchSwarmOrchestration
      tags: [Cluster]
      summary: Patch swarm orchestration config
      description: Updates the swarm orchestration configuration (task history retention limit). Requires operations level 2.
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              type: object
              properties:
                TaskHistoryRetentionLimit:
                  type: integer
            example:
              TaskHistoryRetentionLimit: 10
      responses:
        "200":
          description: Updated orchestration config
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      orchestration:
                        type: object
                        description: Docker swarm.OrchestrationConfig object
        "204":
          description: No content (Prefer return=minimal)
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low
        "409":
          $ref: "#/components/responses/Conflict"

  /swarm/raft:
    patch:
      operationId: patchSwarmRaft
      tags: [Cluster]
      summary: Patch swarm raft config
      description: Updates the swarm Raft configuration (snapshot interval, log entries, election/heartbeat ticks). Requires operations level 2.
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              type: object
              properties:
                SnapshotInterval:
                  type: integer
                  format: uint64
                KeepOldSnapshots:
                  type: integer
                  format: uint64
                LogEntriesForSlowFollowers:
                  type: integer
                  format: uint64
                ElectionTick:
                  type: integer
                HeartbeatTick:
                  type: integer
            example:
              SnapshotInterval: 10000
              ElectionTick: 10
              HeartbeatTick: 1
      responses:
        "200":
          description: Updated raft config
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      raft:
                        type: object
                        description: Docker swarm.RaftConfig object
        "204":
          description: No content (Prefer return=minimal)
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low
        "409":
          $ref: "#/components/responses/Conflict"

  /swarm/dispatcher:
    patch:
      operationId: patchSwarmDispatcher
      tags: [Cluster]
      summary: Patch swarm dispatcher config
      description: Updates the swarm dispatcher configuration (heartbeat period). Requires operations level 2.
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              type: object
              properties:
                HeartbeatPeriod:
                  type: integer
                  format: int64
                  description: Heartbeat period in nanoseconds
            example:
              HeartbeatPeriod: 5000000000
      responses:
        "200":
          description: Updated dispatcher config
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      dispatcher:
                        type: object
                        description: Docker swarm.DispatcherConfig object
        "204":
          description: No content (Prefer return=minimal)
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low
        "409":
          $ref: "#/components/responses/Conflict"

  /swarm/ca:
    patch:
      operationId: patchSwarmCAConfig
      tags: [Cluster]
      summary: Patch swarm CA config
      description: Updates the swarm CA configuration (node cert expiry, external CAs). Requires operations level 3.
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              type: object
              properties:
                NodeCertExpiry:
                  type: integer
                  format: int64
                  description: Node certificate expiry in nanoseconds
            example:
              NodeCertExpiry: 7776000000000000
      responses:
        "200":
          description: Updated CA config
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      caConfig:
                        type: object
                        description: Docker swarm.CAConfig object
        "204":
          description: No content (Prefer return=minimal)
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low
        "409":
          $ref: "#/components/responses/Conflict"

  /swarm/encryption:
    patch:
      operationId: patchSwarmEncryption
      tags: [Cluster]
      summary: Patch swarm encryption config
      description: Toggles Raft data-at-rest encryption. Requires operations level 3.
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              type: object
              required: [AutoLockManagers]
              properties:
                AutoLockManagers:
                  type: boolean
            example:
              AutoLockManagers: true
      responses:
        "200":
          description: Updated encryption config
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      encryption:
                        type: object
                        description: Docker swarm.EncryptionConfig object
        "204":
          description: No content (Prefer return=minimal)
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low
        "409":
          $ref: "#/components/responses/Conflict"

  /swarm/rotate-token:
    post:
      operationId: rotateToken
      tags: [Cluster]
      summary: Rotate join token
      description: Rotates the worker or manager join token. Requires operations level 3.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target]
              properties:
                target:
                  type: string
                  enum: [worker, manager]
                  description: Which join token to rotate
            example:
              target: worker
      responses:
        "204":
          description: Token rotated
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low

  /swarm/rotate-unlock-key:
    post:
      operationId: rotateUnlockKey
      tags: [Cluster]
      summary: Rotate unlock key
      description: Rotates the swarm unlock key. Only works when autolock is enabled. Requires operations level 3.
      responses:
        "200":
          description: New unlock key
          content:
            application/json:
              schema:
                type: object
                properties:
                  unlockKey:
                    type: string
        "403":
          description: Operations level too low
        "409":
          $ref: "#/components/responses/Conflict"

  /swarm/force-rotate-ca:
    post:
      operationId: forceRotateCA
      tags: [Cluster]
      summary: Force CA certificate rotation
      description: Forces rotation of the cluster root CA certificate. Requires operations level 3.
      responses:
        "200":
          description: CA rotation initiated
          content:
            application/json:
              schema:
                type: object
        "403":
          description: Operations level too low
        "409":
          $ref: "#/components/responses/Conflict"

  /swarm/unlock-key:
    get:
      operationId: getUnlockKey
      tags: [Cluster]
      summary: Get swarm unlock key
      description: Returns the current swarm unlock key. Only available when autolock is enabled.
      responses:
        "200":
          description: Current unlock key
          content:
            application/json:
              schema:
                type: object
                properties:
                  unlockKey:
                    type: string
              example:
                unlockKey: SWMKEY-1-kX9P2q3r4s5t6u7v8w9x0y1z2A3B4C5D6E7F8G9H
        "500":
          description: Failed to retrieve unlock key

  /disk-usage:
    get:
      operationId: getDiskUsage
      tags: [Cluster]
      summary: Docker disk usage
      description: Summarized disk usage by category (images, containers, volumes, build cache).
      responses:
        "200":
          description: Disk usage summaries
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiskUsageCollection"
              example:
                "@context": /api/context.jsonld
                "@type": Collection
                items:
                  - type: images
                    totalCount: 24
                    activeCount: 18
                    size: 4823691264
                    reclaimable: 1124532224
                  - type: containers
                    totalCount: 12
                    activeCount: 12
                    size: 234881024
                    reclaimable: 0
                  - type: volumes
                    totalCount: 8
                    activeCount: 6
                    size: 1572864000
                    reclaimable: 419430400
                  - type: buildCache
                    totalCount: 47
                    activeCount: 0
                    size: 312557568
                    reclaimable: 312557568
                total: 4
                limit: 4
                offset: 0
        "304":
          $ref: "#/components/responses/NotModified"

  /plugins:
    get:
      operationId: getPlugins
      tags: [Cluster]
      summary: Installed Docker plugins
      responses:
        "200":
          description: Plugin list
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginCollection"
              example:
                "@context": /api/context.jsonld
                "@type": Collection
                items:
                  - Id: 5724e2c8d8d7
                    Name: vieux/sshfs:latest
                    Enabled: true
                    PluginReference: docker.io/vieux/sshfs:latest@sha256:1234abcd
                    Settings:
                      Args: []
                      Env: ["DEBUG=0"]
                      Mounts: []
                      Devices: []
                  - Id: 8b9c1d2e3f4a
                    Name: rexray/ebs:latest
                    Enabled: false
                    PluginReference: docker.io/rexray/ebs:latest@sha256:5678efgh
                    Settings:
                      Args: []
                      Env: ["EBS_REGION=us-east-1"]
                      Mounts: []
                      Devices: []
                total: 2
                limit: 2
                offset: 0
    post:
      operationId: installPlugin
      tags: [Plugins]
      summary: Install a plugin
      description: |
        Installs a plugin from a remote registry. Requires operations level 3.
        Returns the installed plugin detail as a JSON-LD envelope.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [remote]
              properties:
                remote:
                  type: string
                  description: Plugin reference (e.g. "vieux/sshfs:latest")
            example:
              remote: vieux/sshfs:latest
      responses:
        "201":
          description: Plugin installed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      plugin:
                        type: object
                        description: Docker Plugin object
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low or ACL denied

  /plugins/privileges:
    post:
      operationId: getPluginPrivileges
      tags: [Plugins]
      summary: Get plugin privileges
      description: |
        Returns the list of privileges required by a remote plugin image.
        Used before installing a plugin to review requested permissions.
        Requires operations level 3.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [remote]
              properties:
                remote:
                  type: string
                  description: Plugin reference (e.g. "vieux/sshfs:latest")
            example:
              remote: vieux/sshfs:latest
      responses:
        "200":
          description: Plugin privileges
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      privileges:
                        type: array
                        items:
                          type: object
                        description: List of requested plugin privileges
              example:
                "@context": /api/context.jsonld
                "@id": /plugins/privileges
                "@type": PluginPrivileges
                privileges:
                  - Name: network
                    Description: permissions to access a network
                    Value: [host]
                  - Name: mount
                    Description: host path to mount
                    Value: [""]
                  - Name: device
                    Description: host device to access
                    Value: ["/dev/fuse"]
                  - Name: capabilities
                    Description: list of additional capabilities required
                    Value: ["CAP_SYS_ADMIN"]
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low or ACL denied

  /plugins/{name}:
    get:
      operationId: getPlugin
      tags: [Plugins]
      summary: Plugin detail
      parameters:
        - name: name
          in: path
          required: true
          description: Plugin name
          schema:
            type: string
          example: vieux/sshfs:latest
      responses:
        "200":
          description: Plugin detail
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      plugin:
                        type: object
                        description: Docker Plugin object
              example:
                "@context": /api/context.jsonld
                "@id": /plugins/vieux%2Fsshfs:latest
                "@type": Plugin
                plugin:
                  Id: 5724e2c8d8d7
                  Name: vieux/sshfs:latest
                  Enabled: true
                  PluginReference: docker.io/vieux/sshfs:latest@sha256:1234abcd
                  Config:
                    Description: sshFS plugin for Docker
                    Documentation: https://docs.docker.com/engine/extend/plugins/
                    Interface:
                      Types: [docker.volumedriver/1.0]
                      Socket: sshfs.sock
                    Entrypoint: [/docker-volume-sshfs]
                    Env:
                      - Name: DEBUG
                        Description: Enable debug logging
                        Settable: [value]
                        Value: "0"
                  Settings:
                    Args: []
                    Env: ["DEBUG=0"]
                    Mounts: []
                    Devices: []
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: removePlugin
      tags: [Plugins]
      summary: Remove a plugin
      description: |
        Removes an installed plugin. Use `?force=true` to force removal
        even if the plugin is in use. Requires operations level 3.
      parameters:
        - name: name
          in: path
          required: true
          description: Plugin name
          schema:
            type: string
          example: vieux/sshfs:latest
        - name: force
          in: query
          description: Force removal even if the plugin is in use
          schema:
            type: boolean
            default: false
          example: false
      responses:
        "204":
          description: Plugin removed
        "403":
          description: Operations level too low or ACL denied
        "404":
          $ref: "#/components/responses/NotFound"

  /plugins/{name}/enable:
    post:
      operationId: enablePlugin
      tags: [Plugins]
      summary: Enable a plugin
      description: Enables a disabled plugin. Requires operations level 2.
      parameters:
        - name: name
          in: path
          required: true
          description: Plugin name
          schema:
            type: string
          example: vieux/sshfs:latest
      responses:
        "204":
          description: Plugin enabled
        "403":
          description: Operations level too low or ACL denied
        "404":
          $ref: "#/components/responses/NotFound"

  /plugins/{name}/disable:
    post:
      operationId: disablePlugin
      tags: [Plugins]
      summary: Disable a plugin
      description: Disables an enabled plugin. Requires operations level 2.
      parameters:
        - name: name
          in: path
          required: true
          description: Plugin name
          schema:
            type: string
          example: vieux/sshfs:latest
      responses:
        "204":
          description: Plugin disabled
        "403":
          description: Operations level too low or ACL denied
        "404":
          $ref: "#/components/responses/NotFound"

  /plugins/{name}/upgrade:
    post:
      operationId: upgradePlugin
      tags: [Plugins]
      summary: Upgrade a plugin
      description: |
        Upgrades a plugin to a new remote image. Requires operations level 3.
        Returns the updated plugin detail, or 204 with `Prefer: return=minimal`.
      parameters:
        - name: name
          in: path
          required: true
          description: Plugin name
          schema:
            type: string
          example: vieux/sshfs:latest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [remote]
              properties:
                remote:
                  type: string
                  description: New plugin reference
            example:
              remote: vieux/sshfs:v1.2.0
      responses:
        "200":
          description: Upgraded plugin detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      plugin:
                        type: object
                        description: Docker Plugin object
        "204":
          description: No content (Prefer return=minimal)
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low or ACL denied
        "404":
          $ref: "#/components/responses/NotFound"

  /plugins/{name}/settings:
    patch:
      operationId: configurePlugin
      tags: [Plugins]
      summary: Configure plugin settings
      description: |
        Updates plugin args and environment variables. Requires operations level 2.
        Returns the updated plugin detail, or 204 with `Prefer: return=minimal`.
      parameters:
        - name: name
          in: path
          required: true
          description: Plugin name
          schema:
            type: string
          example: vieux/sshfs:latest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                args:
                  type: array
                  items:
                    type: string
                  description: Plugin args to set
                env:
                  type: array
                  items:
                    type: string
                  description: Plugin env vars to set
            example:
              env: ["DEBUG=1", "EBS_REGION=eu-west-1"]
      responses:
        "200":
          description: Updated plugin detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      plugin:
                        type: object
                        description: Docker Plugin object
        "204":
          description: No content (Prefer return=minimal)
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low or ACL denied
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Nodes ────────────────────────────────────────────────────────────

  /nodes:
    get:
      operationId: listNodes
      tags: [Nodes]
      summary: List nodes
      parameters:
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - name: sort
          in: query
          description: Field to sort the result list by
          schema:
            type: string
            enum: [hostname, role, status, availability]
          example: hostname
        - $ref: "#/components/parameters/dir"
      responses:
        "200":
          description: Paginated node list
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            Link:
              $ref: "#/components/headers/Link"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeCollection"
              example:
                "@context": /api/context.jsonld
                "@type": Collection
                items:
                  - ID: qz7k3v9xm2p4
                    Version: { Index: 42 }
                    CreatedAt: "2025-01-15T10:30:00Z"
                    Spec:
                      Name: node-1
                      Role: manager
                      Availability: active
                    Status:
                      State: ready
                      Addr: 10.0.0.2
                    Description:
                      Hostname: node-1
                      Platform: { Architecture: x86_64, OS: linux }
                      Resources: { NanoCPUs: 4000000000, MemoryBytes: 8589934592 }
                    ManagerStatus:
                      Leader: true
                      Reachability: reachable
                      Addr: 10.0.0.2:2377
                total: 3
                limit: 50
                offset: 0
            application/atom+xml:
              schema:
                $ref: "#/components/schemas/AtomFeed"
        "304":
          $ref: "#/components/responses/NotModified"
        "400":
          $ref: "#/components/responses/BadRequest"

  /nodes/{id}:
    get:
      operationId: getNode
      tags: [Nodes]
      summary: Node detail
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Node detail
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      node:
                        type: object
                        description: Docker swarm.Node object
              example:
                "@context": /api/context.jsonld
                "@id": /nodes/qz7k3v9xm2p4
                "@type": Node
                node:
                  ID: qz7k3v9xm2p4
                  Version: { Index: 42 }
                  CreatedAt: "2025-01-15T10:30:00Z"
                  Spec:
                    Name: node-1
                    Role: manager
                    Availability: active
                    Labels:
                      region: us-east-1
                  Status:
                    State: ready
                    Addr: 10.0.0.2
                  Description:
                    Hostname: node-1
                    Platform: { Architecture: x86_64, OS: linux }
                    Resources: { NanoCPUs: 4000000000, MemoryBytes: 8589934592 }
                    Engine: { EngineVersion: "27.4.1" }
                  ManagerStatus:
                    Leader: true
                    Reachability: reachable
                    Addr: 10.0.0.2:2377
            application/atom+xml:
              schema:
                $ref: "#/components/schemas/AtomFeed"
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: removeNode
      tags: [Nodes]
      summary: Remove a node
      description: Removes a node from the swarm. The node must be drained or down. Requires operations level 3.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "204":
          description: Node removed
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /nodes/{id}/tasks:
    get:
      operationId: getNodeTasks
      tags: [Nodes]
      summary: Tasks running on a node
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Collection of enriched tasks
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskCollection"
              example:
                "@context": /api/context.jsonld
                "@type": Collection
                items:
                  - ID: tsk_abc123def456
                    ServiceID: r8m2x5nk3p7q
                    ServiceName: webapp
                    NodeID: qz7k3v9xm2p4
                    NodeHostname: node-1
                    Slot: 1
                    Status:
                      State: running
                      Timestamp: "2026-04-13T08:12:34Z"
                      ContainerStatus: { ContainerID: c1d2e3f4a5b6 }
                    DesiredState: running
                  - ID: tsk_def456ghi789
                    ServiceID: t9n3y6ol4q8r
                    ServiceName: api
                    NodeID: qz7k3v9xm2p4
                    NodeHostname: node-1
                    Slot: 2
                    Status:
                      State: running
                      Timestamp: "2026-04-13T08:12:35Z"
                      ContainerStatus: { ContainerID: d2e3f4a5b6c7 }
                    DesiredState: running
                total: 2
                limit: 2
                offset: 0
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/NotFound"

  /nodes/{id}/availability:
    put:
      operationId: updateNodeAvailability
      tags: [Nodes]
      summary: Update node availability
      description: Sets the availability of a node (active, drain, or pause).
      parameters:
        - $ref: "#/components/parameters/resourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [availability]
              properties:
                availability:
                  type: string
                  enum: [active, drain, pause]
                  description: New availability state for the node
            example:
              availability: drain
      responses:
        "200":
          description: Updated node
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      node:
                        type: object
                        description: Docker swarm.Node object
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /nodes/{id}/labels:
    get:
      operationId: getNodeLabels
      tags: [Nodes]
      summary: Get node labels
      description: Returns the current labels of the node as a key/value map.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Node labels
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      labels:
                        type: object
                        additionalProperties:
                          type: string
              example:
                "@context": /api/context.jsonld
                "@id": /nodes/qz7k3v9xm2p4/labels
                "@type": NodeLabels
                labels:
                  region: us-east-1
                  env: production
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchNodeLabels
      tags: [Nodes]
      summary: Patch node labels
      description: |
        Applies a JSON Patch (RFC 6902) to the node labels.
        Requires `Content-Type: application/json-patch+json`.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              $ref: "#/components/schemas/JSONPatch"
            example:
              - op: add
                path: /env
                value: staging
              - op: remove
                path: /deprecated-label
      responses:
        "200":
          description: Updated node labels
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      labels:
                        type: object
                        additionalProperties:
                          type: string
        "204":
          description: No content (Prefer return=minimal)
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"

  /nodes/{id}/role:
    get:
      operationId: getNodeRole
      tags: [Nodes]
      summary: Get node role
      description: Returns the current role of the node (worker or manager).
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Node role
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      role:
                        type: string
                        enum: [worker, manager]
                      isLeader:
                        type: boolean
                      managerCount:
                        type: integer
              example:
                "@context": /api/context.jsonld
                "@id": /nodes/qz7k3v9xm2p4/role
                "@type": NodeRole
                role: manager
                isLeader: true
                managerCount: 3
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateNodeRole
      tags: [Nodes]
      summary: Update node role
      description: Promotes or demotes a node. Requires operations level 3.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [worker, manager]
                  description: New role for the node
            example:
              role: manager
      responses:
        "200":
          description: Updated node
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      node:
                        type: object
                        description: Docker swarm.Node object
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Services ─────────────────────────────────────────────────────────

  /services:
    get:
      operationId: listServices
      tags: [Services]
      summary: List services
      parameters:
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - name: sort
          in: query
          description: Field to sort the result list by
          schema:
            type: string
            enum: [name, mode]
          example: name
        - $ref: "#/components/parameters/dir"
      responses:
        "200":
          description: Paginated service list
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            Link:
              $ref: "#/components/headers/Link"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceCollection"
              example:
                "@context": /api/context.jsonld
                "@type": Collection
                items:
                  - ID: r8m2x5nk3p7q
                    Version: { Index: 156 }
                    Spec:
                      Name: webapp
                      Labels:
                        com.docker.stack.namespace: myapp
                      TaskTemplate:
                        ContainerSpec:
                          Image: nginx:1.27@sha256:abc123...
                        Resources:
