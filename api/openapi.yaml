  /services/{id}/container-config:
    get:
      operationId: getServiceContainerConfig
      tags: [Services]
      summary: Get service container config
      description: Returns the container-level configuration (hostname, user, working dir, args, etc.).
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Container configuration
          content:
            application/json:
              schema:
                type: object
                description: Subset of Docker container spec fields
              example:
                Hostname: webapp
                User: "1000:1000"
                WorkingDir: /app
                Command: ["/usr/local/bin/server"]
                Args: ["--config", "/etc/app/config.toml"]
                TTY: false
                OpenStdin: false
                StopSignal: SIGTERM
                StopGracePeriod: 10000000000
                ReadOnly: true
                Init: true
                CapabilityAdd: ["NET_BIND_SERVICE"]
                CapabilityDrop: ["ALL"]
                Sysctls:
                  net.core.somaxconn: "1024"
                DNSConfig:
                  Nameservers: ["1.1.1.1", "1.0.0.1"]
                  Search: ["internal.example.com"]
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchServiceContainerConfig
      tags: [Services]
      summary: Patch service container config
      description: |
        Applies a JSON Merge Patch (RFC 7396) to the service container configuration.
        Requires `Content-Type: application/merge-patch+json`. Requires operations level 2.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              type: object
              description: Container config fields to merge
            example:
              WorkingDir: /srv
              StopGracePeriod: 30000000000
              ReadOnly: true
      responses:
        "200":
          description: Updated container configuration
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      containerConfig:
                        type: object
                        description: Container config fields
        "204":
          description: No content (Prefer return=minimal)
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"

  /services/{id}/mode:
    put:
      operationId: updateServiceMode
      tags: [Services]
      summary: Change service mode
      description: |
        Changes the service mode between replicated and global.
        For replicated mode, specify the initial replica count. Requires operations level 3.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [replicated, global]
                replicas:
                  type: integer
                  minimum: 0
                  description: Initial replica count (only for replicated mode)
            example:
              mode: replicated
              replicas: 3
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      service:
                        type: object
                        description: Docker swarm.Service object
                      integrations:
                        type: array
                        description: Detected third-party integrations (e.g. Traefik)
                        items:
                          $ref: "#/components/schemas/Integration"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /services/{id}/endpoint-mode:
    put:
      operationId: updateServiceEndpointMode
      tags: [Services]
      summary: Change service endpoint mode
      description: |
        Changes the service endpoint mode between vip and dnsrr. Requires operations level 3.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpointMode]
              properties:
                endpointMode:
                  type: string
                  enum: [vip, dnsrr]
                  description: New endpoint resolution mode (virtual IP or DNS round-robin)
            example:
              endpointMode: vip
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      service:
                        type: object
                        description: Docker swarm.Service object
                      integrations:
                        type: array
                        description: Detected third-party integrations (e.g. Traefik)
                        items:
                          $ref: "#/components/schemas/Integration"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Tasks ────────────────────────────────────────────────────────────

  /tasks:
    get:
      operationId: listTasks
      tags: [Tasks]
      summary: List tasks
      description: |
        Tasks are returned as EnrichedTask objects with ServiceName and
        NodeHostname populated from cache cross-references.
      parameters:
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - name: sort
          in: query
          description: Field to sort the result list by
          schema:
            type: string
            enum: [state, service, node]
          example: state
        - $ref: "#/components/parameters/dir"
      responses:
        "200":
          description: Paginated task list
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            Link:
              $ref: "#/components/headers/Link"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskCollection"
              example:
                "@context": /api/context.jsonld
                "@type": Collection
                items:
                  - ID: t7w2k9m4x1p6
                    ServiceID: r8m2x5nk3p7q
                    NodeID: qz7k3v9xm2p4
                    Slot: 1
                    Status:
                      Timestamp: "2025-03-20T14:22:00Z"
                      State: running
                      ContainerStatus:
                        ContainerID: abc123def456
                    DesiredState: running
                    ServiceName: webapp
                    NodeHostname: node-1
                total: 42
                limit: 50
                offset: 0
            application/atom+xml:
              schema:
                $ref: "#/components/schemas/AtomFeed"
        "304":
          $ref: "#/components/responses/NotModified"
        "400":
          $ref: "#/components/responses/BadRequest"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [Tasks]
      summary: Task detail
      description: |
        Returns the enriched task with cross-references to its service and node.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "200":
          description: Task detail with service and node refs
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      task:
                        $ref: "#/components/schemas/EnrichedTask"
                      service:
                        type: object
                        description: Cross-reference to the parent service
                        properties:
                          "@id":
                            type: string
                          name:
                            type: string
                      node:
                        type: object
                        description: Cross-reference to the assigned node
                        properties:
                          "@id":
                            type: string
                          hostname:
                            type: string
              example:
                "@context": /api/context.jsonld
                "@id": /tasks/t7w2k9m4x1p6
                "@type": Task
                task:
                  ID: t7w2k9m4x1p6
                  ServiceID: r8m2x5nk3p7q
                  NodeID: qz7k3v9xm2p4
                  Slot: 1
                  Status:
                    Timestamp: "2025-03-20T14:22:00Z"
                    State: running
                    ContainerStatus:
                      ContainerID: abc123def456
                      PID: 12345
                  DesiredState: running
                  ServiceName: webapp
                  NodeHostname: node-1
                service:
                  "@id": /services/r8m2x5nk3p7q
                  name: webapp
                node:
                  "@id": /nodes/qz7k3v9xm2p4
                  hostname: node-1
            application/atom+xml:
              schema:
                $ref: "#/components/schemas/AtomFeed"
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: removeTask
      tags: [Tasks]
      summary: Force-remove a task
      description: |
        Forces removal of a task (equivalent to `docker rm -f` on the underlying container).
        Only works on tasks whose containers are still accessible on the node.
      parameters:
        - $ref: "#/components/parameters/resourceId"
      responses:
        "204":
          description: Task removed
        "404":
          $ref: "#/components/responses/NotFound"

  /tasks/{id}/logs:
    get:
      operationId: getTaskLogs
      tags: [Tasks]
      summary: Task logs
      description: |
        JSON (default): returns paginated log lines.
        SSE (`Accept: text/event-stream`): streams log lines in real time.

        SSE streams have a 128-connection limit (returns 429 when exceeded).
      parameters:
        - $ref: "#/components/parameters/resourceId"
        - $ref: "#/components/parameters/logLimit"
        - $ref: "#/components/parameters/logAfter"
        - $ref: "#/components/parameters/logBefore"
        - $ref: "#/components/parameters/logStream"
      responses:
        "200":
          description: Log lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogResponse"
            text/event-stream:
              schema:
                $ref: "#/components/schemas/LogLine"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ── History ──────────────────────────────────────────────────────────

  /history:
    get:
      operationId: getHistory
      tags: [History]
      summary: Resource change history
      description: |
        Returns recent change events from the in-memory ring buffer (10,000 entries).
        Can be filtered by resource type and/or specific resource ID.
      parameters:
        - name: type
          in: query
          description: Filter by resource type (node, service, task, etc.)
          schema:
            type: string
          example: service
        - name: resourceId
          in: query
          description: Filter by specific resource ID
          schema:
            type: string
          example: r8m2x5nk3p7q
        - name: limit
          in: query
          description: Max entries to return
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          example: 50
      responses:
        "200":
          description: History entries
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryCollection"
              example:
                "@context": /api/context.jsonld
                "@type": Collection
                items:
                  - id: 1042
                    type: service
                    action: update
                    resourceId: r8m2x5nk3p7q
                    resourceName: webapp
                    timestamp: "2025-03-20T14:30:00Z"
                  - id: 1041
                    type: task
                    action: create
                    resourceId: t7w2k9m4x1p6
                    resourceName: "webapp.1"
                    timestamp: "2025-03-20T14:29:58Z"
                total: 1042
                limit: 50
                offset: 0
            application/atom+xml:
              schema:
                $ref: "#/components/schemas/AtomFeed"
        "304":
          $ref: "#/components/responses/NotModified"

  # ── Stacks ───────────────────────────────────────────────────────────

  /stacks:
    get:
      operationId: listStacks
      tags: [Stacks]
      summary: List stacks
      description: Stacks derived from the com.docker.stack.namespace label.
      parameters:
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - name: sort
          in: query
          description: Field to sort the result list by
          schema:
            type: string
            enum: [name]
          example: name
        - $ref: "#/components/parameters/dir"
      responses:
        "200":
          description: Paginated stack list
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
            Link:
              $ref: "#/components/headers/Link"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StackCollection"
              example:
                "@context": /api/context.jsonld
                "@type": Collection
                items:
                  - name: myapp
                    services: [r8m2x5nk3p7q, j4n6w8t2k9m1]
                    configs: [cfg_abc123]
                    secrets: [sec_def456]
                    networks: [net_ghi789]
                    volumes: []
                total: 4
                limit: 50
                offset: 0
            application/atom+xml:
              schema:
                $ref: "#/components/schemas/AtomFeed"
        "304":
          $ref: "#/components/responses/NotModified"
        "400":
          $ref: "#/components/responses/BadRequest"

  /stacks/summary:
    get:
      operationId: getStackSummary
      tags: [Stacks]
      summary: Stack summaries with metrics
      description: |
        Returns all stacks with task counts and optional Prometheus metrics
        (memory usage, CPU usage per stack).
      responses:
        "200":
          description: Stack summaries
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StackSummaryCollection"
              example:
                "@context": /api/context.jsonld
                "@type": Collection
                items:
                  - name: myapp
                    services: 4
                    runningTasks: 11
                    desiredTasks: 12
                    cpuUsage: 1.42
                    memoryUsage: 2147483648
                  - name: monitoring
                    services: 3
                    runningTasks: 3
                    desiredTasks: 3
                    cpuUsage: 0.18
                    memoryUsage: 536870912
                total: 2
                limit: 2
                offset: 0
        "304":
          $ref: "#/components/responses/NotModified"

  /stacks/{name}:
    get:
      operationId: getStack
      tags: [Stacks]
      summary: Stack detail
      description: Full stack with all its services, configs, secrets, networks, and volumes.
      parameters:
        - name: name
          in: path
          required: true
          description: Stack name
          schema:
            type: string
          example: myapp
      responses:
        "200":
          description: Stack detail
          headers:
            ETag:
              $ref: "#/components/headers/ETag"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DetailEnvelope"
                  - type: object
                    properties:
                      stack:
                        $ref: "#/components/schemas/StackDetail"
              example:
                "@context": /api/context.jsonld
                "@id": /stacks/myapp
                "@type": Stack
                stack:
                  name: myapp
                  services:
                    - ID: r8m2x5nk3p7q
                      Spec: { Name: webapp }
                  configs:
                    - ID: cfg_abc123
                      Spec: { Name: app.conf }
                  secrets:
                    - ID: sec_def456
                      Spec: { Name: db_password }
                  networks:
                    - Id: net_ghi789
                      Name: myapp_default
                  volumes: []
            application/atom+xml:
              schema:
                $ref: "#/components/schemas/AtomFeed"
        "304":
          $ref: "#/components/responses/NotModified"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: removeStack
      tags: [Stacks]
      summary: Remove a stack
      description: Removes all services in the stack. Requires operations level 3.
      parameters:
        - name: name
          in: path
          required: true
          description: Stack name
          schema:
            type: string
          example: myapp
      responses:
        "200":
          description: Stack removal initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  removed:
                    type: array
                    items:
                      type: string
                    description: IDs of removed services
                  failed:
                    type: array
                    items:
                      type: string
                    description: IDs of services that failed to remove
        "403":
          description: Operations level too low
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Configs ──────────────────────────────────────────────────────────

  /configs:
    get:
      operationId: listConfigs
      tags: [Configs]
      summary: List configs
      parameters:
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/filter"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - name: sort
