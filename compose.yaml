version: "3.8"

services:
  cetacean:
    image: cetacean:latest
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CETACEAN_PROMETHEUS_URL=${CETACEAN_PROMETHEUS_URL:-}
    networks:
      - monitoring
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

networks:
  monitoring:
    external: true
    name: monitoring_monitoring
