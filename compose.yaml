version: "3.8"

services:
  cetacean:
    image: cetacean:latest
    ports:
      - published: 9000
        target: 9000
        protocol: tcp
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        read_only: true
    environment:
      CETACEAN_PROMETHEUS_URL: "${CETACEAN_PROMETHEUS_URL:-}"
    networks:
      - monitoring
    deploy:
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

networks:
  monitoring:
    external: true
    name: monitoring
