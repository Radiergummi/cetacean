# Dev Auth & ACL Compose — test all auth and authorization modes
#
# Build first:   docker build -t cetacean:latest .
# Start:         docker compose -f compose.dev-auth.yaml up
#
# Authentication ports:
#   9001  no auth        (direct)
#   9002  oidc           (Caddy TLS → cetacean → Dex)
#   9003  headers        (Caddy injects headers → cetacean)
#   9004  cert           (Caddy plain HTTP → mTLS → cetacean)
#   9010  Dex            (OIDC login: dev@localhost / password)
#
# Authorization ports (file policy, ops level 2):
#   9005  ACL admin      (group: ops — full read+write)
#   9006  ACL viewer     (group: viewers — read-only everywhere)
#   9007  ACL team dev   (group: frontend — read+write on frontend-* stacks, read elsewhere)
#   9008  ACL on-call    (group: oncall — write services+tasks, read-only infra)
#
# Authorization ports (provider grants, no file policy):
#   9009  ACL provider   (grants injected via X-ACL header)

configs:
  dex-config:
    content: |
      issuer: http://localhost:9010/dex

      storage:
        type: sqlite3
        config:
          file: ":memory:"

      web:
        http: 0.0.0.0:5556

      staticClients:
        - id: cetacean
          secret: cetacean-dev-secret
          name: Cetacean Dev
          redirectURIs:
            - https://localhost:9002/auth/callback

      enablePasswordDB: true

      staticPasswords:
        - email: dev@localhost
          hash: "$$2a$$10$$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"
          username: Dev User
          userID: "00000000-0000-0000-0000-000000000001"

  caddyfile-oidc:
    content: |
      {
        local_certs
      }

      :9002 {
        tls internal
        reverse_proxy cetacean-oidc:9000
      }

  caddyfile-headers:
    content: |
      :9003

      reverse_proxy cetacean-headers:9000 {
        header_up X-Auth-User "dev@localhost"
        header_up X-Auth-Name "Dev User"
        header_up X-Auth-Email "dev@localhost"
        header_up X-Auth-Groups "admins,developers"
        header_up X-Proxy-Secret "dev-secret"
      }

  caddyfile-cert:
    content: |
      :9004

      reverse_proxy https://cetacean-cert:9000 {
        transport http {
          tls_client_auth /certs/client.pem /certs/client-key.pem
          tls_trusted_ca_certs /certs/ca.pem
        }
      }

  acl-policy:
    content: |
      grants:
        # Ops: full access to everything
        - resources: ["*"]
          audience: ["group:ops"]
          permissions: ["read", "write"]

        # Viewers: read-only everywhere
        - resources: ["*"]
          audience: ["group:viewers"]
          permissions: ["read"]

        # Frontend team: full access to frontend-* stacks, read elsewhere
        - resources: ["stack:frontend-*"]
          audience: ["group:frontend"]
          permissions: ["read", "write"]
        - resources: ["*"]
          audience: ["group:frontend"]
          permissions: ["read"]

        # On-call: write services and tasks, read-only infra
        - resources: ["service:*", "task:*"]
          audience: ["group:oncall"]
          permissions: ["read", "write"]
        - resources: ["node:*", "swarm:*", "config:*", "secret:*", "network:*", "volume:*"]
          audience: ["group:oncall"]
          permissions: ["read"]

  caddyfile-acl:
    content: |
      # Admin (ops group — full access)
      :9005 {
        reverse_proxy cetacean-acl:9000 {
          header_up X-Auth-User "admin@example.com"
          header_up X-Auth-Name "Admin"
          header_up X-Auth-Email "admin@example.com"
          header_up X-Auth-Groups "ops"
          header_up X-Proxy-Secret "acl-secret"
        }
      }

      # Viewer (read-only)
      :9006 {
        reverse_proxy cetacean-acl:9000 {
          header_up X-Auth-User "viewer@example.com"
          header_up X-Auth-Name "Viewer"
          header_up X-Auth-Email "viewer@example.com"
          header_up X-Auth-Groups "viewers"
          header_up X-Proxy-Secret "acl-secret"
        }
      }

      # Team developer (frontend group)
      :9007 {
        reverse_proxy cetacean-acl:9000 {
          header_up X-Auth-User "dev@frontend.team"
          header_up X-Auth-Name "Frontend Dev"
          header_up X-Auth-Email "dev@frontend.team"
          header_up X-Auth-Groups "frontend"
          header_up X-Proxy-Secret "acl-secret"
        }
      }

      # On-call engineer
      :9008 {
        reverse_proxy cetacean-acl:9000 {
          header_up X-Auth-User "oncall@example.com"
          header_up X-Auth-Name "On-Call"
          header_up X-Auth-Email "oncall@example.com"
          header_up X-Auth-Groups "oncall"
          header_up X-Proxy-Secret "acl-secret"
        }
      }

  caddyfile-acl-provider:
    content: |
      :9009

      reverse_proxy cetacean-acl-provider:9000 {
        header_up X-Auth-User "alice@example.com"
        header_up X-Auth-Name "Alice"
        header_up X-Auth-Email "alice@example.com"
        header_up X-Auth-Groups "engineering"
        header_up X-Proxy-Secret "provider-secret"
        header_up X-ACL '[{"resources":["service:*","task:*"],"permissions":["read","write"]},{"resources":["node:*"],"permissions":["read"]}]'
      }

services:
  # --- Certificate generation (one-shot) ---
  cert-init:
    image: alpine
    command:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache openssl >/dev/null 2>&1
        cd /certs

        # CA
        openssl ecparam -genkey -name prime256v1 -out ca-key.pem
        openssl req -x509 -new -key ca-key.pem -out ca.pem -days 365 \
          -subj "/CN=Cetacean Dev CA"

        # Server cert (for cetacean-cert)
        openssl ecparam -genkey -name prime256v1 -out server-key.pem
        openssl req -new -key server-key.pem -out server.csr \
          -subj "/CN=cetacean-cert"
        openssl x509 -req -in server.csr -CA ca.pem -CAkey ca-key.pem \
          -CAcreateserial -out server.pem -days 365 \
          -extfile <(echo "subjectAltName=DNS:cetacean-cert")

        # Client cert (for caddy-cert to present)
        openssl ecparam -genkey -name prime256v1 -out client-key.pem
        openssl req -new -key client-key.pem -out client.csr \
          -subj "/CN=caddy-proxy"
        openssl x509 -req -in client.csr -CA ca.pem -CAkey ca-key.pem \
          -CAcreateserial -out client.pem -days 365

        rm -f *.csr *.srl
        echo "Certificates generated successfully"
    volumes:
      - certs:/certs

  # --- OIDC provider ---
  dex:
    image: dexidp/dex
    command: ["dex", "serve", "/etc/dex/dex.yaml"]
    ports:
      - "9010:5556"
    configs:
      - source: dex-config
        target: /etc/dex/dex.yaml
    networks:
      - auth-dev

  # --- Auth mode: none (port 9001) ---
  cetacean-none:
    build: .
    ports:
      - "9001:9000"
    environment:
      CETACEAN_AUTH_MODE: none
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - auth-dev

  # --- Auth mode: oidc (port 9002 via caddy-oidc) ---
  cetacean-oidc:
    build: .
    environment:
      CETACEAN_AUTH_MODE: oidc
      CETACEAN_AUTH_OIDC_ISSUER: http://localhost:9010/dex
      CETACEAN_AUTH_OIDC_CLIENT_ID: cetacean
      CETACEAN_AUTH_OIDC_CLIENT_SECRET: cetacean-dev-secret
      CETACEAN_AUTH_OIDC_REDIRECT_URL: https://localhost:9002/auth/callback
    extra_hosts:
      - "localhost:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - dex
    networks:
      - auth-dev

  caddy-oidc:
    image: caddy:2
    ports:
      - "9002:9002"
    configs:
      - source: caddyfile-oidc
        target: /etc/caddy/Caddyfile
    depends_on:
      - cetacean-oidc
    networks:
      - auth-dev

  # --- Auth mode: headers (port 9003 via caddy-headers) ---
  cetacean-headers:
    build: .
    environment:
      CETACEAN_AUTH_MODE: headers
      CETACEAN_AUTH_HEADERS_SUBJECT: X-Auth-User
      CETACEAN_AUTH_HEADERS_NAME: X-Auth-Name
      CETACEAN_AUTH_HEADERS_EMAIL: X-Auth-Email
      CETACEAN_AUTH_HEADERS_GROUPS: X-Auth-Groups
      CETACEAN_AUTH_HEADERS_SECRET_HEADER: X-Proxy-Secret
      CETACEAN_AUTH_HEADERS_SECRET_VALUE: dev-secret
      CETACEAN_AUTH_HEADERS_TRUSTED_PROXIES: 0.0.0.0/0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - auth-dev

  caddy-headers:
    image: caddy:2
    ports:
      - "9003:9003"
    configs:
      - source: caddyfile-headers
        target: /etc/caddy/Caddyfile
    depends_on:
      - cetacean-headers
    networks:
      - auth-dev

  # --- Auth mode: cert (port 9004 via caddy-cert) ---
  cetacean-cert:
    build: .
    environment:
      CETACEAN_AUTH_MODE: cert
      CETACEAN_AUTH_CERT_CA: /certs/ca.pem
      CETACEAN_TLS_CERT: /certs/server.pem
      CETACEAN_TLS_KEY: /certs/server-key.pem
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/certs:ro
    depends_on:
      cert-init:
        condition: service_completed_successfully
    networks:
      - auth-dev

  caddy-cert:
    image: caddy:2
    ports:
      - "9004:9004"
    configs:
      - source: caddyfile-cert
        target: /etc/caddy/Caddyfile
    volumes:
      - certs:/certs:ro
    depends_on:
      cert-init:
        condition: service_completed_successfully
      cetacean-cert:
        condition: service_started
    networks:
      - auth-dev

  # --- Auth mode: headers + file ACL policy (ports 9005–9008 via caddy-acl) ---
  cetacean-acl:
    build: .
    environment:
      CETACEAN_AUTH_MODE: headers
      CETACEAN_AUTH_HEADERS_SUBJECT: X-Auth-User
      CETACEAN_AUTH_HEADERS_NAME: X-Auth-Name
      CETACEAN_AUTH_HEADERS_EMAIL: X-Auth-Email
      CETACEAN_AUTH_HEADERS_GROUPS: X-Auth-Groups
      CETACEAN_AUTH_HEADERS_SECRET_HEADER: X-Proxy-Secret
      CETACEAN_AUTH_HEADERS_SECRET_VALUE: acl-secret
      CETACEAN_AUTH_HEADERS_TRUSTED_PROXIES: 0.0.0.0/0
      CETACEAN_ACL_POLICY_FILE: /etc/cetacean/acl-policy.yaml
      CETACEAN_OPERATIONS_LEVEL: "2"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    configs:
      - source: acl-policy
        target: /etc/cetacean/acl-policy.yaml
    networks:
      - auth-dev

  caddy-acl:
    image: caddy:2
    ports:
      - "9005:9005"
      - "9006:9006"
      - "9007:9007"
      - "9008:9008"
    configs:
      - source: caddyfile-acl
        target: /etc/caddy/Caddyfile
    depends_on:
      - cetacean-acl
    networks:
      - auth-dev

  # --- Auth mode: headers + provider-sourced ACL grants (port 9009 via caddy-acl-provider) ---
  cetacean-acl-provider:
    build: .
    environment:
      CETACEAN_AUTH_MODE: headers
      CETACEAN_AUTH_HEADERS_SUBJECT: X-Auth-User
      CETACEAN_AUTH_HEADERS_NAME: X-Auth-Name
      CETACEAN_AUTH_HEADERS_EMAIL: X-Auth-Email
      CETACEAN_AUTH_HEADERS_GROUPS: X-Auth-Groups
      CETACEAN_AUTH_HEADERS_SECRET_HEADER: X-Proxy-Secret
      CETACEAN_AUTH_HEADERS_SECRET_VALUE: provider-secret
      CETACEAN_AUTH_HEADERS_TRUSTED_PROXIES: 0.0.0.0/0
      CETACEAN_AUTH_HEADERS_ACL: X-ACL
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - auth-dev

  caddy-acl-provider:
    image: caddy:2
    ports:
      - "9009:9009"
    configs:
      - source: caddyfile-acl-provider
        target: /etc/caddy/Caddyfile
    depends_on:
      - cetacean-acl-provider
    networks:
      - auth-dev

networks:
  auth-dev:

volumes:
  certs:
